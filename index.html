<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LostGames — каталог игр</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255, 120, 0, 0.5);
      --accent: #ff7800;
      --accent-dim: rgba(255,120,0,0.12);
      --accent-glow: rgba(255,120,0,0.25);
      --text: #f0ece4;
      --text-muted: #666;
      --text-sub: #999;
      --radius: 20px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    ::selection { background: var(--accent); color: #000; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    /* ── HEADER ── */
    .site-header {
      padding: 64px 32px 48px;
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
      flex-wrap: wrap;
    }

    .header-left {}

    .header-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-eyebrow::before {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    .site-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3.5rem, 8vw, 6.5rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .site-header h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .header-sub {
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 0.875rem;
      max-width: 360px;
      line-height: 1.7;
      font-weight: 300;
    }

    /* ── CONTROLS ── */
    .controls {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 32px 32px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 16px 10px 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: var(--transition);
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .search-input::placeholder { color: var(--text-muted); }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 9px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* ── GRID ── */
    .games-grid {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 32px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    /* ── CARD ── */
    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition), opacity var(--transition);
      animation: fadeUp 0.5s ease both;
      position: relative;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .game-card:hover {
      transform: translateY(-6px);
      border-color: var(--border-hover);
      box-shadow: 0 24px 48px -12px rgba(0,0,0,0.6), 0 0 0 1px var(--border-hover);
    }
    .game-card.hidden { display: none; }

    /* STATUS RIBBON */
    .status-ribbon {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 5px 12px;
      border-radius: 50px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .status-ribbon.released { background: rgba(40,200,100,0.2); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
    .status-ribbon.early { background: rgba(255,120,0,0.2); color: var(--accent); border: 1px solid rgba(255,120,0,0.3); }
    .status-ribbon.upcoming { background: rgba(100,150,255,0.15); color: #93c5fd; border: 1px solid rgba(147,197,253,0.25); }

    /* MEDIA */
    .media-block {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #050505;
    }
    .poster-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .trailer-iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .game-card:hover .poster-img { opacity: 0; transform: scale(1.04); }
    .game-card:hover .trailer-iframe { opacity: 1; pointer-events: auto; }

    .poster-fallback {
      display: none;
      align-items: center;
      justify-content: center;
      height: 100%;
      background: var(--surface2);
      color: var(--accent);
      font-size: 2.5rem;
    }

    /* CARD CONTENT */
    .card-content { padding: 22px 22px 20px; }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .genre-tag {
      font-size: 0.67rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 4px 12px;
      border-radius: 50px;
      border: 1px solid rgba(255,120,0,0.2);
    }
    .card-year {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .game-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 10px;
      color: var(--text);
    }

    .short-desc {
      color: var(--text-muted);
      font-size: 0.825rem;
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-weight: 300;
    }

    .card-footer {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .store-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid transparent;
      transition: var(--transition);
      cursor: pointer;
      background: none;
      color: inherit;
    }
    .store-btn.steam { background: rgba(27,107,80,0.25); color: #4ade80; border-color: rgba(27,107,80,0.4); }
    .store-btn.steam:hover { background: rgba(27,107,80,0.5); }
    .store-btn.torrent { background: var(--accent-dim); color: var(--accent); border-color: rgba(255,120,0,0.3); }
    .store-btn.torrent:hover { background: var(--accent); color: #000; }
    .store-btn.vkplay { background: rgba(0,119,255,0.15); color: #60a5fa; border-color: rgba(0,119,255,0.3); }
    .store-btn.vkplay:hover { background: rgba(0,119,255,0.35); }
    .store-btn.epic { background: rgba(255,255,255,0.06); color: var(--text-sub); border-color: var(--border); }
    .store-btn.epic:hover { background: rgba(255,255,255,0.12); color: var(--text); }

    .detail-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: color var(--transition);
      flex-shrink: 0;
    }
    .detail-btn:hover { color: var(--accent); }
    .detail-btn svg { transition: transform var(--transition); }
    .detail-btn:hover svg { transform: translateX(3px); }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
    }
    .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 16px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 1000;
      padding: 24px;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      max-width: 880px;
      width: 100%;
      position: relative;
      animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
      overflow: hidden;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.94) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-hero {
      position: relative;
      aspect-ratio: 21/9;
      background: #050505;
      overflow: hidden;
    }
    .modal-hero img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .modal-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--surface) 0%, transparent 60%);
    }
    .modal-hero-title {
      position: absolute;
      bottom: 24px;
      left: 28px;
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      color: var(--text-sub);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: var(--transition);
    }
    .modal-close:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    .modal-body { padding: 28px; }

    .modal-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .modal-badge {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 50px;
    }

    .modal-desc {
      color: var(--text-sub);
      font-size: 0.9rem;
      line-height: 1.75;
      font-weight: 300;
      margin-bottom: 24px;
    }

    .modal-section-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .spec-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .spec-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 4px; }
    .spec-value { font-size: 0.875rem; font-weight: 500; color: var(--text); }

    .screenshots-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .screenshots-gallery img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
    }
    .screenshots-gallery img:hover {
      border-color: var(--accent);
      transform: scale(1.02);
    }

    .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 4px; }
    .modal-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 22px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
      cursor: pointer;
      border: 1px solid transparent;
    }
    .modal-action-btn.primary { background: var(--accent); color: #000; }
    .modal-action-btn.primary:hover { background: #ff9a30; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,120,0,0.3); }
    .modal-action-btn.secondary { background: var(--surface2); color: var(--text-sub); border-color: var(--border); }
    .modal-action-btn.secondary:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── FOOTER ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 32px;
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-left { font-size: 0.78rem; color: var(--text-muted); }
    .footer-left strong { color: var(--accent); font-weight: 600; }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition);
    }
    .footer-links a:hover { color: var(--accent); }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 12px; }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .lightbox-close:hover { background: var(--accent); color: #000; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .site-header { flex-direction: column; align-items: flex-start; padding: 40px 20px 32px; }
      .controls { padding: 0 20px 24px; }
      .games-grid { padding: 0 20px 60px; gap: 16px; grid-template-columns: 1fr; }
      .site-footer { padding: 24px 20px; }
      .modal-hero { aspect-ratio: 16/9; }
      .modal-hero-title { font-size: 1.5rem; left: 20px; bottom: 18px; }
      .modal-body { padding: 20px; }
      .specs-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-left">
    <div class="header-eyebrow">Indie Game Catalogue</div>
    <h1>Lost<em>Games</em></h1>
    <p class="header-sub">Редкие и недооценённые игры, которые стоит найти. Наведи на карточку — запустится трейлер.</p>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" class="search-input" placeholder="Поиск игры..." id="searchInput">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">Все</button>
  </div>
</div>

<!-- GRID -->
<main class="games-grid" id="gamesGrid"></main>

<!-- FOOTER -->
<footer>
  <div class="site-footer">
    <div class="footer-left"><strong>LostGames</strong> — некоммерческий каталог инди-игр</div>
    <div class="footer-links">
      <a href="#">GitHub</a>
      <a href="#">Telegram</a>
      <a href="#">О проекте</a>
    </div>
  </div>
</footer>

<!-- MODAL -->
<div id="modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-box">
    <button class="modal-close" id="modalClose" aria-label="Закрыть">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <button class="lightbox-close" id="lightboxClose">&times;</button>
  <img id="lightboxImg" src="" alt="screenshot">
</div>

<script>
// ─────────────────────────────────────────────
//  ДАННЫЕ
// ─────────────────────────────────────────────
const games = [
  {
    id: "roadtovostok",
    title: "Road to Vostok",
    genre: "Hardcore Survival",
    year: "2026",
    status: "early",
    statusText: "Ранний доступ",
    shortDesc: "Хардкорный одиночный симулятор выживания в постапокалиптической приграничной зоне с перманентной смертью.",
    fullDesc: "Road to Vostok — хардкорная survival игра в постапокалиптической зоне отчуждения на границе. Игрок собирает ресурсы, улучшает экипировку и пробивается через опасные локации. Перманентная смерть делает каждое решение критически важным.",
    poster: "https://raw.githubusercontent.com/Stintik-Official/HiddenGames/main/images/roadtovostok_poster.jpg",
    trailer: "https://www.youtube.com/embed/OTFgTRsz43Q?autoplay=1&mute=1&loop=1&
