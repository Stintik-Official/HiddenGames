<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LostGames — каталог инди-игр</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f1a;
      font-family: -apple-system, 'Segoe UI', 'Roboto', 'Inter', sans-serif;
      color: #e0e0e0;
      line-height: 1.5;
    }

    /* центральная узкая лента */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* шапка */
    .header {
      padding: 24px 0 16px;
      border-bottom: 1px solid #1e2a3a;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
      text-decoration: none;
    }
    .logo span {
      color: #3b82f6;
    }
    .search {
      flex: 1;
      max-width: 400px;
    }
    .search input {
      width: 100%;
      background: #111827;
      border: 1px solid #2a3a4a;
      border-radius: 8px;
      padding: 8px 14px;
      color: #e0e0e0;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    .search input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .nav-links {
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    .nav-links a:hover {
      color: #3b82f6;
    }

    /* карточка игры */
    .game-card {
      display: flex;
      gap: 20px;
      background: #111827;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      transition: all 0.2s ease;
      border: 1px solid #1e2a3a;
      cursor: pointer;
    }
    .game-card:hover {
      transform: translateY(-2px);
      background: #1a2535;
      border-color: #3b82f6;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* обложка */
    .card-poster {
      flex-shrink: 0;
      width: 120px;
      height: 160px;
      overflow: hidden;
      border-radius: 8px;
      background: #0f1722;
    }
    .card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .no-poster {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a2535;
      color: #777;
      font-size: 0.7rem;
      text-align: center;
    }

    /* контент карточки */
    .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.7rem;
      color: #aaa;
      margin-bottom: 10px;
      border-bottom: 1px dashed #2a3a4a;
      padding-bottom: 6px;
    }
    .card-meta span {
      background: #1a2535;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .card-description {
      font-size: 0.8rem;
      color: #bbb;
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-links a {
      background: #1e2a3a;
      color: #ccc;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      text-decoration: none;
      transition: 0.2s;
    }
    .card-links a:hover {
      background: #3b82f6;
      color: #ffffff;
    }

    /* статус бейдж */
    .status-badge {
      display: inline-block;
      background: #3b82f622;
      color: #3b82f6;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      margin-left: 8px;
    }

    /* пагинация */
    .pagination {
      margin: 32px 0;
      text-align: center;
    }
    .pagination button {
      background: #111827;
      border: 1px solid #2a3a4a;
      color: #ccc;
      padding: 6px 14px;
      margin: 0 4px;
      border-radius: 6px;
      cursor: pointer;
    }
    .pagination button:hover {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    /* модальное окно */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal-content {
      background: #111827;
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
      border: 1px solid #2a3a4a;
    }
    .modal-content h3 {
      font-size: 1.5rem;
      margin-bottom: 16px;
    }
    .modal-content p {
      margin-bottom: 16px;
      color: #bbb;
    }
    .modal-close {
      float: right;
      font-size: 1.8rem;
      cursor: pointer;
      color: #aaa;
    }
    .modal-close:hover {
      color: #3b82f6;
    }

    .footer {
      text-align: center;
      padding: 32px 0;
      border-top: 1px solid #1e2a3a;
      margin-top: 32px;
      font-size: 0.7rem;
      color: #666;
    }

    @media (max-width: 700px) {
      .game-card {
        flex-direction: column;
      }
      .card-poster {
        width: 100%;
        height: auto;
        aspect-ratio: 16/9;
      }
      .header {
        flex-direction: column;
        align-items: stretch;
      }
      .search {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="#" class="logo">Lost<span>Games</span></a>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Поиск игр...">
    </div>
    <div class="nav-links">
      <a href="#">Новинки</a>
      <a href="#">Жанры</a>
      <a href="#">Обновления</a>
    </div>
  </div>

  <div id="gamesContainer"></div>

  <div class="footer">
    LostGames — некоммерческий каталог инди-игр. Все права принадлежат разработчикам.
  </div>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  //  ДАННЫЕ ИГР (постеры пока заглушки, заменишь позже)
  // --------------------------------------------------------------
  const gamesData = [
    {
      title: "Road to Vostok",
      genre: "Hardcore Survival",
      version: "Ранний доступ",
      status: "v0.8",
      year: "2026",
      description: "Хардкорный одиночный симулятор выживания в постапокалиптической приграничной зоне. Собирай ресурсы, улучшай экипировку и пытайся выжить.",
      fullDesc: "Полное описание игры: Road to Vostok — это атмосферное выживание, где каждый шаг может стать последним. Игроку предстоит исследовать заброшенные постройки, торговать с редкими торговцами и постепенно продвигаться к загадочному сектору «Восток». Игра находится в раннем доступе и постоянно обновляется.",
      poster: "https://placehold.co/120x160/0f1722/3b82f6?text=Road+to+Vostok",
      links: {
        steam: "https://store.steampowered.com/app/1963610/Road_to_Vostok/",
        torrent: "#"
      }
    },
    {
      title: "NO LAW",
      genre: "Cyberpunk FPS",
      version: "Скоро",
      status: "разработка",
      year: "2026",
      description: "Кибернуарный боевик от создателей The Ascent. Открытый город, выбор, последствия.",
      fullDesc: "NO LAW — это игра про преступный мир будущего. Вы — наемник, который должен выжить в городе без законов. Используйте киберимпланты, оружие и хитрость, чтобы пройти сюжет, который зависит от ваших решений.",
      poster: "https://placehold.co/120x160/0f1722/3b82f6?text=NO+LAW",
      links: {
        steam: "https://store.steampowered.com/app/2674320/NO_LAW/",
        torrent: "#"
      }
    },
    {
      title: "INDUSTRIA 2",
      genre: "Narrative FPS",
      version: "Вышла",
      status: "1.0",
      year: "2026",
      description: "Сиквел инди-хита. Нора пытается вернуться домой из параллельного мира, поглощённого ИИ.",
      fullDesc: "INDUSTRIA 2 продолжает историю первого шутера. Главная героиня оказывается в технологически развитом, но враждебном измерении. Сражайтесь, решайте головоломки и открывайте тайны ИИ.",
      poster: "https://placehold.co/120x160/0f1722/3b82f6?text=INDUSTRIA+2",
      links: {
        steam: "https://store.steampowered.com/app/2154070/INDUSTRIA_2/",
        torrent: "#"
      }
    },
    {
      title: "Blight: Survival",
      genre: "Co-op Survival Horror",
      version: "Скоро",
      status: "демо",
      year: "2026",
      description: "Средневековый хоррор с кооперативом. Исследуйте проклятые земли, сражайтесь с монстрами.",
      fullDesc: "Blight: Survival — игра на выживание в жутком средневековом сеттинге. Вместе с друзьями вы будете исследовать лес, собирать ресурсы и сражаться с порождениями чумы.",
      poster: "https://placehold.co/120x160/0f1722/3b82f6?text=Blight+Survival",
      links: {
        steam: "https://store.steampowered.com/app/1963610/Blight_Survival/",
        torrent: "#"
      }
    },
    {
      title: "Styx: Blades of Greed",
      genre: "Stealth Action",
      version: "Вышла",
      status: "1.0",
      year: "2026",
      description: "Возвращение знаменитого гоблина-вора. Стелс, засады, планирование.",
      fullDesc: "Styx: Blades of Greed — это новая глава в приключениях ловкого гоблина. Планируйте ограбления, используйте скрытность и десятки приспособлений, чтобы выполнять контракты.",
      poster: "https://placehold.co/120x160/0f1722/3b82f6?text=Styx",
      links: {
        steam: "https://store.steampowered.com/app/3290690/Styx_Blades_of_Greed/",
        torrent: "#"
      }
    }
  ];

  // Функция отображения карточек
  function renderCards(games) {
    const container = document.getElementById('gamesContainer');
    if (!container) return;
    container.innerHTML = '';
    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      const statusBadge = game.status ? `<span class="status-badge">${game.status}</span>` : '';
      card.innerHTML = `
        <div class="card-poster">
          ${game.poster ? `<img src="${game.poster}" alt="${game.title}">` : `<div class="no-poster">no image</div>`}
        </div>
        <div class="card-content">
          <div class="card-title">
            ${game.title} ${statusBadge}
          </div>
          <div class="card-meta">
            <span>${game.genre}</span>
            <span>${game.version}</span>
            ${game.year ? `<span>${game.year}</span>` : ''}
          </div>
          <div class="card-description">${game.description}</div>
          <div class="card-links">
            ${game.links.steam ? `<a href="${game.links.steam}" target="_blank" rel="noopener">Steam</a>` : ''}
            ${game.links.torrent && game.links.torrent !== '#' ? `<a href="${game.links.torrent}" target="_blank" rel="noopener">Торрент</a>` : ''}
          </div>
        </div>
      `;
      // Открытие модалки по клику на карточку
      card.addEventListener('click', (e) => {
        // Чтобы случайно не кликнуть по ссылке в карточке и не открыть модалку одновременно
        if (e.target.tagName === 'A') return;
        openModal(game);
      });
      container.appendChild(card);
    });
  }

  // Поиск
  const searchInput = document.getElementById('searchInput');
  function filterGames() {
    const query = searchInput.value.toLowerCase();
    const filtered = gamesData.filter(game => game.title.toLowerCase().includes(query));
    renderCards(filtered);
  }
  searchInput.addEventListener('input', filterGames);

  // Модальное окно
  const modal = document.getElementById('modal');
  function openModal(game) {
    const modalBody = document.getElementById('modalBody');
    modalBody.innerHTML = `
      <h3>${game.title}</h3>
      <p><strong>Жанр:</strong> ${game.genre}</p>
      <p><strong>Версия:</strong> ${game.version}</p>
      <p><strong>Год:</strong> ${game.year}</p>
      <p><strong>Статус:</strong> ${game.status}</p>
      <p>${game.fullDesc || game.description}</p>
      <div class="card-links" style="margin-top: 16px;">
        ${game.links.steam ? `<a href="${game.links.steam}" target="_blank" rel="noopener">Steam</a>` : ''}
        ${game.links.torrent && game.links.torrent !== '#' ? `<a href="${game.links.torrent}" target="_blank" rel="noopener">Торрент</a>` : ''}
      </div>
    `;
    modal.style.display = 'flex';
  }

  function closeModal() {
    modal.style.display = 'none';
  }

  window.onclick = function(event) {
    if (event.target == modal) closeModal();
  }

  // начальный рендер
  renderCards(gamesData);
</script>
</body>
</html>
