<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IndieHaven — Каталог инди-игр</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #eef2ff;
      line-height: 1.5;
    }

    /* Шапка */
    .site-header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .site-header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #ffb347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    .site-header p {
      color: #9aa4b2;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    /* Сетка карточек */
    .games-grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
    }

    /* Карточка */
    .game-card {
      background: #13171d;
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: 1px solid #222a34;
    }
    .game-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 32px -12px rgba(0,0,0,0.5);
      border-color: #ffb347;
    }

    /* Медиа-блок (картинка + видео) */
    .media-block {
      position: relative;
      background: #000;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }
    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #0a0c10;
      transition: opacity 0.25s ease;
    }
    .trailer-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .game-card:hover .poster-img {
      opacity: 0;
    }
    .game-card:hover .trailer-iframe {
      opacity: 1;
      pointer-events: auto;
    }

    /* Контент */
    .card-content {
      padding: 20px;
    }
    .game-title {
      font-size: 1.35rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .game-title span {
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(255,179,71,0.15);
      padding: 4px 12px;
      border-radius: 40px;
      color: #ffb347;
    }
    .short-desc {
      color: #acb6c8;
      font-size: 0.85rem;
      margin: 12px 0 18px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      background: #2a313c;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }
    .btn-steam {
      background: #1b6b50;
    }
    .btn-steam:hover {
      background: #1f8a68;
    }
    .btn-desc {
      background: #2a313c;
      border: 1px solid #3a4452;
    }
    .btn-desc:hover {
      background: #3a4452;
      border-color: #ffb347;
    }

    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .modal-content {
      background: #13171d;
      border: 1px solid #2a313c;
      border-radius: 28px;
      max-width: 1000px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
    }
    .modal-close:hover {
      color: #ffb347;
    }
    .modal h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .status-badge {
      display: inline-block;
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 0.75rem;
      background: rgba(255,179,71,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      color: #ffb347;
    }
    .modal-subhead {
      color: #ffb347;
      border-left: 3px solid #ffb347;
      padding-left: 12px;
      margin: 20px 0 16px;
      font-weight: 600;
    }
    .screenshots-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .screenshots-gallery img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #2a313c;
      cursor: pointer;
      transition: 0.2s;
      loading="lazy";
    }
    .screenshots-gallery img:hover {
      transform: scale(1.02);
      border-color: #ffb347;
    }
    .specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: #0f1218;
      padding: 16px;
      border-radius: 20px;
      margin: 16px 0;
    }
    .specs p {
      font-size: 0.85rem;
      color: #cbd5e6;
    }
    .specs strong {
      color: #ffb347;
    }
    .footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid #22282f;
      font-size: 0.75rem;
      color: #5f6c82;
    }
    .footer a {
      color: #ffb347;
      text-decoration: none;
    }

    @media (max-width: 860px) {
      .games-grid {
        gap: 20px;
        padding: 24px 16px;
      }
      .modal-content {
        padding: 18px;
      }
      .specs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
