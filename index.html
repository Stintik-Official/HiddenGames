<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>IndieHaven — Каталог инди-игр</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    /* ===== ВСЕ СТИЛИ (ТАКИЕ ЖЕ, КАК РАБОТАЮТ) ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c10; font-family: 'Inter', sans-serif; color: #eef2ff; line-height: 1.5; }
    .site-header { text-align: center; padding: 48px 24px 32px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .site-header h1 { font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #ffb347); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: -0.02em; }
    .site-header p { color: #9aa4b2; margin-top: 12px; font-size: 0.9rem; }
    .games-grid { max-width: 1400px; margin: 0 auto; padding: 48px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 32px; }
    .game-card { background: #13171d; border-radius: 20px; overflow: hidden; transition: transform 0.25s ease, box-shadow 0.25s ease; border: 1px solid #222a34; }
    .game-card:hover { transform: translateY(-6px); box-shadow: 0 20px 32px -12px rgba(0,0,0,0.5); border-color: #ffb347; }
    .media-block { position: relative; background: #000; aspect-ratio: 16 / 9; overflow: hidden; }
    .poster-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.25s ease; }
    .trailer-iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; opacity: 0; transition: opacity 0.25s ease; pointer-events: none; }
    .game-card:hover .poster-img { opacity: 0; }
    .game-card:hover .trailer-iframe { opacity: 1; pointer-events: auto; }
    .card-content { padding: 20px; }
    .game-title { font-size: 1.35rem; font-weight: 700; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .game-title span { font-size: 0.7rem; font-weight: 600; background: rgba(255,179,71,0.15); padding: 4px 12px; border-radius: 40px; color: #ffb347; }
    .short-desc { color: #acb6c8; font-size: 0.85rem; margin: 12px 0 18px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { background: #2a313c; border: none; padding: 8px 18px; border-radius: 40px; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: 0.2s; color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-family: inherit; }
    .btn-steam { background: #1b6b50; }
    .btn-steam:hover { background: #1f8a68; }
    .btn-desc { background: #2a313c; border: 1px solid #3a4452; }
    .btn-desc:hover { background: #3a4452; border-color: #ffb347; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 24px; }
    .modal-content { background: #13171d; border: 1px solid #2a313c; border-radius: 28px; max-width: 1000px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 28px; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 20px; font-size: 28px; cursor: pointer; color: #aaa; transition: 0.2s; }
    .modal-close:hover { color: #ffb347; }
    .modal h2 { font-size: 1.8rem; margin-bottom: 8px; }
    .status-badge { display: inline-block; margin-top: 4px; margin-bottom: 12px; font-size: 0.75rem; background: rgba(255,179,71,0.2); padding: 4px 12px; border-radius: 20px; color: #ffb347; }
    .modal-subhead { color: #ffb347; border-left: 3px solid #ffb347; padding-left: 12px; margin: 20px 0 16px; font-weight: 600; }
    .screenshots-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
    .screenshots-gallery img { width: 100%; border-radius: 12px; border: 1px solid #2a313c; cursor: pointer; transition: 0.2s; }
    .screenshots-gallery img:hover { transform: scale(1.02); border-color: #ffb347; }
    .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #0f1218; padding: 16px; border-radius: 20px; margin: 16px 0; }
    .specs p { font-size: 0.85rem; color: #cbd5e6; }
    .specs strong { color: #ffb347; }
    .footer { text-align: center; padding: 32px 24px; border-top: 1px solid #22282f; font-size: 0.75rem; color: #5f6c82; }
    .footer a { color: #ffb347; text-decoration: none; }
    @media (max-width: 860px) { .games-grid { gap: 20px; padding: 24px 16px; } .modal-content { padding: 18px; } .specs { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="site-header">
  <h1>🎮 IndieHaven</h1>
  <p>Каталог лучших инди-игр. Наведи на карточку — запустится трейлер. Нажми «Описание» — увидишь подробности.</p>
</div>

<div class="games-grid" id="gamesGrid"></div>

<footer class="footer">
  <p>🎮 IndieHaven — некоммерческий каталог. Все ссылки ведут в Steam.</p>
  <p><a href="#">GitHub</a> · <a href="#">Telegram</a></p>
</footer>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  //  ДАННЫЕ ИГР (РЕАЛЬНЫЕ КАРТИНКИ ДЛЯ ДВУХ ИГР)

      poster: "https://raw.githubusercontent.com/Stintik-Official/HiddenGames/main/images/roadtovostok_poster.jpg",
      trailer: "https://www.youtube.com/embed/OTFgTRsz43Q?autoplay=1&mute=1&loop=1&playlist=OTFgTRsz43Q&controls=0&modestbranding=1&showinfo=0&rel=0",
      screenshots: [
        "https://raw.githubusercontent.com/Stintik-Official/HiddenGames/main/images/roadtovostok_scr1.jpg",
        "https://raw.githubusercontent.com/Stintik-Official/HiddenGames/main/images/roadtovostok_scr2.jpg",
        "https://raw.githubusercontent.com/Stintik-Official/HiddenGames/main/images/roadtovostok_scr3.jpg"
      ],
      specs: { release: "7 апреля 2026 (Ранний доступ)", developer: "Antti", publisher: "Road to Vostok Ltd", engine: "Unity", platform: "PC (Steam)" },
      steamLink: "https://store.steampowered.com/app/1963610/Road_to_Vostok/"
    },
    {
      id: "nolaw",
      title: "NO LAW",
      genre: "Cyberpunk FPS",
      status: "🕒 В разработке (2026)",
      shortDesc: "Кибернуарный боевик от создателей The Ascent. Город без правил, нелинейный сюжет.",
      fullDesc: "NO LAW — кибернуарный экшен от первого лица от создателей The Ascent. Действие в городе Порт Дезайр, погрязшем в беззаконии.",
      poster: "https://raw.githubusercontent.com/Stintik-Official/HiddenGames/main/images/nolaw_poster.jpg",
      trailer: "https://www.youtube.com/embed/uD6kFXZlX00?autoplay=1&mute=1&loop=1&playlist=uD6kFXZlX00&controls=0&modestbranding=1&showinfo=0&rel=0",
      screenshots: [
        "https://raw.githubusercontent.com/Stintik-Official/HiddenGames/main/images/nolaw_scr1.jpg",
        "https://raw.githubusercontent.com/Stintik-Official/HiddenGames/main/images/nolaw_scr2.jpg",
        "https://raw.githubusercontent.com/Stintik-Official/HiddenGames/main/images/nolaw_scr3.jpg"
      ],
      specs: { release: "2026 (дата уточняется)", developer: "Neon Giant", publisher: "KRAFTON", engine: "Unreal Engine 4", platform: "PC, PS5, Xbox" },
      steamLink: "https://store.steampowered.com/app/2674320/NO_LAW/"
    },
    {
      id: "industria2",
      title: "INDUSTRIA 2",
      genre: "Narrative FPS",
      status: "✅ Вышла (30 апреля 2026)",
      shortDesc: "Нарративный шутер. Ты — Нора, застрявшая в параллельном измерении. Мрачная атмосфера, стимпанк-Берлин.",
      fullDesc: "INDUSTRIA 2 — сиквел инди-хита. Нора пытается вернуться домой из параллельного мира, поглощённого ИИ.",
      poster: "https://placehold.co/600x338/1e293b/ffb347?text=INDUSTRIA+2+Poster",
      trailer: "https://www.youtube.com/embed/EDWeb7r26ao?autoplay=1&mute=1&loop=1&playlist=EDWeb7r26ao&controls=0&modestbranding=1&showinfo=0&rel=0",
      screenshots: [
        "https://placehold.co/300x169/1e293b/ffb347?text=Industria+2+scr1",
        "https://placehold.co/300x169/1e293b/ffb347?text=Industria+2+scr2",
        "https://placehold.co/300x169/1e293b/ffb347?text=Industria+2+scr3"
      ],
      specs: { release: "30 апреля 2026", developer: "Bleakmill", publisher: "Headup", engine: "Unreal Engine 5", platform: "PC (Steam)" },
      steamLink: "https://store.steampowered.com/app/2154070/INDUSTRIA_2/"
    },
    {
      id: "blight",
      title: "Blight: Survival",
      genre: "Co-op Survival Horror",
      status: "🕒 В разработке (после 2026)",
      shortDesc: "Кооперативный экшен-хоррор в средневековом мире, охваченном чумой.",
      fullDesc: "Blight: Survival — кооперативная игра на выживание. Вместе с друзьями исследуйте проклятые земли, сражайтесь с монстрами.",

      trailer: "https://www.youtube.com/embed/voOCzFCHRI4?autoplay=1&mute=1&loop=1&playlist=voOCzFCHRI4&controls=0&modestbranding=1&showinfo=0&rel=0",
      screenshots: [
        "https://placehold.co/300x169/1e293b/ffb347?text=Blight+scr1",
        "https://placehold.co/300x169/1e293b/ffb347?text=Blight+scr2"
      ],
      specs: { release: "Ожидается после 2026", developer: "Haenir Studio", publisher: "Unknown", engine: "Unreal Engine 4", platform: "PC (Steam)" },
      steamLink: "https://store.steampowered.com/app/1963610/Blight_Survival/"
    },
    {
      id: "styx",
      title: "Styx: Blades of Greed",
      genre: "Stealth Action",
      status: "✅ Вышла (19 февраля 2026)",
      shortDesc: "Продолжение приключений гоблина-вора Стикса. Стелс-экшен с огромными локациями.",
      fullDesc: "Styx: Blades of Greed — возвращение знаменитого гоблина-вора. Планируйте ограбления, используйте скрытность.",
      poster: "https://placehold.co/600x338/1e293b/ffb347?text=Styx+Poster",
      trailer: "https://www.youtube.com/embed/Ygt8NtWBCsM?autoplay=1&mute=1&loop=1&playlist=Ygt8NtWBCsM&controls=0&modestbranding=1&showinfo=0&rel=0",
      screenshots: [
        "https://placehold.co/300x169/1e293b/ffb347?text=Styx+scr1",
        "https://placehold.co/300x169/1e293b/ffb347?text=Styx+scr2"
      ],
      specs: { release: "19 февраля 2026", developer: "Cyanide Studio", publisher: "Nacon", engine: "Unreal Engine 4", platform: "PC, PS5, Xbox" },
      steamLink: "https://store.steampowered.com/app/1963610/Styx_Blades_of_Greed/"
    }
  ];

  // Генерация карточек
  const grid = document.getElementById('gamesGrid');
  function renderCards() {
    grid.innerHTML = '';
    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.innerHTML = `
        <div class="media-block">
          <img class="poster-img" src="${game.poster}" alt="${game.title}" loading="lazy">
          <iframe class="trailer-iframe" src="${game.trailer}" loading="lazy" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="card-content">
          <div class="game-title">${game.title} <span>${game.genre}</span></div>
          <div class="short-desc">${game.shortDesc}</div>
          <div class="card-buttons">
            <a href="${game.steamLink}" target="_blank" class="btn btn-steam">В Steam →</a>
            <button class="btn btn-desc" data-id="${game.id}">📖 Описание</button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
    document.querySelectorAll('.btn-desc').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.getAttribute('data-id');
        const game = games.find(g => g.id === id);
        if (game) openModal(game);
      });
    });
  }

  const modal = document.getElementById('modal');
  const modalBody = document.getElementById('modalBody');
  function openModal(game) {
    const screensHtml = game.screenshots.map(url => `<img src="${url}" alt="screenshot" onclick="window.open('${url}','_blank')">`).join('');
    modalBody.innerHTML = `
      <h2>${game.title}</h2>
      <div class="status-badge">${game.status}</div>
      <div class="specs">
        <p><strong>Релиз:</strong> ${game.specs.release}</p>
        <p><strong>Разработчик:</strong> ${game.specs.developer}</p>
        <p><strong>Издатель:</strong> ${game.specs.publisher}</p>
        <p><strong>Движок:</strong> ${game.specs.engine}</p>
        <p><strong>Платформа:</strong> ${game.specs.platform}</p>
      </div>
      <div class="modal-subhead">📖 Сюжет и особенности</div>
      <p style="margin-bottom: 20px;">${game.fullDesc}</p>
      <div class="modal-subhead">📸 Скриншоты</div>
      <div class="screenshots-gallery">${screensHtml}</div>
      <div class="card-buttons" style="margin-top: 20px;">
        <a href="${game.steamLink}" target="_blank" class="btn btn-steam">Перейти в Steam →</a>
      </div>
    `;
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }
  document.querySelector('.modal-close').addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

  renderCards();
</script>
</body>
</html>
