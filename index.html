  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --bg-card: #121212;
      --text-primary: #f8f9fa;
      --text-secondary: #a8b0b9;
      --accent: #ff8c00;
      --accent-glow: rgba(255, 140, 0, 0.5);
      --border: #2a2a2a;
      --gradient: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #ff8c00 100%);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    [data-theme="light"] {
      --bg-primary: #f8f9fa;
      --bg-secondary: #e9ecef;
      --bg-card: #ffffff;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --border: #dee2e6;
      --shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg-primary);
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      cursor: none;
    }
    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      transition: transform 0.1s ease;
    }
    .cursor.hover { transform: scale(2); }
    /* Particles background */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      background: radial-gradient(circle at 20% 80%, rgba(255,140,0,0.1) 0%, transparent 50%), 
                  radial-gradient(circle at 80% 20%, rgba(255,140,0,0.05) 0%, transparent 50%);
      animation: float 20s infinite linear;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    /* Top bar - search & filter */
    .top-bar {
      position: sticky;
      top: 0;
      background: rgba(18,18,18,0.95);
      backdrop-filter: blur(20px);
      padding: 16px 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .search-input {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 50px;
      color: var(--text-primary);
      font-size: 1rem;
    }
    .search-input::placeholder { color: var(--text-secondary); }
    .filter-btn, .theme-toggle {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-btn:hover, .theme-toggle:hover {
      background: var(--accent);
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    /* Header */
    .site-header {
      text-align: center;
      padding: 80px 24px 40px;
      position: relative;
    }
    .site-header h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 20px var(--accent-glow)); }
      to { filter: drop-shadow(0 0 30px var(--accent-glow)); }
    }
    .site-header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-top: 16px;
      max-width: 600px;
      margin-inline: auto;
    }
    /* Grid */
    .games-grid {
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 32px;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .game-card {
      background: var(--bg-card);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      opacity: 0;
      animation: cardSlideIn 0.6s ease-out forwards;
    }
    .game-card:nth-child(odd) { animation-delay: 0.1s; }
    .game-card:nth-child(even) { animation-delay: 0.2s; }
    @keyframes cardSlideIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .game-card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 24px 64px rgba(255,140,0,0.3);
      border-color: var(--accent);
    }
    .shimmer {
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transform: scaleX(0);
      transition: transform 0.5s;
    }
    .game-card:hover .shimmer { transform: scaleX(1); }
    /* Media */
    .media-block {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #000;
    }
    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .game-card:hover .poster-img {
      opacity: 0;
      filter: blur(4px) brightness(0.7);
      transform: scale(1.1);
    }
    .trailer-iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border: none;
    }
    .game-card:hover .trailer-iframe {
      opacity: 1;
    }
    /* Content */
    .card-content {
      padding: 24px;
    }
    .game-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .genre-badge {
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(255,140,0,0.2);
      padding: 6px 14px;
      border-radius: 50px;
      color: var(--accent);
      backdrop-filter: blur(10px);
    }
    .status-badge {
      font-size: 0.75rem;
      background: rgba(255,140,0,0.15);
      padding: 4px 12px;
      border-radius: 20px;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .short-desc {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 20px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .store-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .store-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: var(--text-primary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .store-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .store-btn:hover::before { left: 100%; }
    .store-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .store-btn.steam { background: linear-gradient(135deg, #1b6b50, #2d865a); border-color: #1b6b50; }
    .store-btn.torrent { border-color: var(--accent); color: var(--accent); }
    .store-btn.vkplay { background: linear-gradient(135deg, #0077ff, #005fcc); }
    .store-btn.epic { border-color: #fff; }
    .store-btn[data-action="info"] { width: 100%; justify-content: center; background: var(--accent); color: #000; font-weight: 600; }
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      padding: 32px;
      animation: modalSlideIn 0.4s ease-out;
    }
    @keyframes modalSlideIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 32px;
      max-width: 1100px;
      width: 95%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 40px;
      position: relative;
      box-shadow: 0 32px 128px rgba(0,0,0,0.6);
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 32px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.3s;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .modal-close:hover {
      color: var(--accent);
      background: rgba(255,140,0,0.2);
      transform: rotate(90deg);
    }
    .screenshots-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }
    .screenshots-gallery img {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.3s;
    }
    .screenshots-gallery img:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }
    .specs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      background: var(--bg-secondary);
      padding: 20px;
      border-radius: 20px;
      margin: 20px 0;
    }
    .specs p {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .specs strong {
      color: var(--text-primary);
    }
    .modal-subhead {
      color: var(--accent);
      font-size: 1.2rem;
      font-weight: 600;
      border-left: 4px solid var(--accent);
      padding-left: 16px;
      margin: 32px 0 16px;
    }
    /* Footer */
    .footer {
      text-align: center;
      padding: 48px 24px;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.3s;
    }
    .footer a:hover { text-shadow: 0 0 10px var(--accent-glow); }
    /* Responsive */
    @media (max-width: 768px) {
      .top-bar { flex-direction: column; gap: 12px; }
      .games-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; padding: 24px 16px; }
      .site-header { padding: 60px 16px 32px; }
      .card-content { padding: 20px; }
    }
    /* Hide scroll on body when modal open */
    body.modal-open { overflow: hidden; }
  </style>
</head>
