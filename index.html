<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LostGames — каталог инди-игр</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg:       #07080d;
      --surface:  #0e1018;
      --card:     #111420;
      --border:   rgba(255,255,255,.07);
      --border-h: rgba(255,200,80,.45);
      --accent:   #ffc840;
      --accent2:  #ff6b35;
      --text:     #e8eaf2;
      --muted:    #727d96;
      --radius:   20px;
      --ease:     cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 9999;
      opacity: .6;
    }

    /* ── ambient glow blobs ── */
    .ambient {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .ambient span {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      animation: drift 18s ease-in-out infinite alternate;
    }
    .ambient span:nth-child(1) {
      width: 520px; height: 520px;
      background: rgba(255,200,64,.06);
      top: -160px; left: -120px;
      animation-duration: 20s;
    }
    .ambient span:nth-child(2) {
      width: 380px; height: 380px;
      background: rgba(255,107,53,.05);
      bottom: 10%; right: -80px;
      animation-duration: 15s; animation-delay: -7s;
    }
    .ambient span:nth-child(3) {
      width: 280px; height: 280px;
      background: rgba(80,120,255,.04);
      top: 50%; left: 40%;
      animation-duration: 25s; animation-delay: -12s;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.12); }
    }

    /* ── layout ── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 36px 60px;
    }

    /* ── header ── */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      margin-bottom: 56px;
      padding: 18px 28px;
      background: rgba(14,16,24,.75);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 40px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
      animation: slideDown .6s var(--ease) both;
    }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: grid; place-items: center;
      font-size: 1.2rem;
      box-shadow: 0 4px 16px rgba(255,200,64,.3);
      flex-shrink: 0;
    }
    .brand-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(100deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand-text p { color: var(--muted); font-size: .75rem; margin-top: 1px; }

    .top-nav { display: flex; gap: 8px; }
    .nav-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px;
      border-radius: 40px;
      background: transparent;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
      font-size: .85rem;
      transition: all .2s var(--ease);
      border: 1px solid transparent;
    }
    .nav-pill:hover {
      background: rgba(255,200,64,.1);
      border-color: rgba(255,200,64,.3);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .nav-pill i { font-size: .8rem; }

    /* ── section title ── */
    .section-head {
      display: flex; align-items: baseline; gap: 16px;
      margin-bottom: 32px;
      animation: fadeUp .6s var(--ease) .2s both;
    }
    .section-head h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .section-head .line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .section-head .count {
      font-size: .75rem; color: var(--muted);
      background: rgba(255,255,255,.05);
      padding: 3px 10px; border-radius: 20px;
    }

    /* ── grid ── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    /* ── card ── */
    .game-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
      transition: transform .35s var(--ease), box-shadow .35s var(--ease), border-color .35s var(--ease);
      animation: fadeUp .5s var(--ease) both;
      cursor: default;
    }
    .game-card:hover {
      transform: translateY(-10px) scale(1.01);
      box-shadow: 0 28px 50px -10px rgba(0,0,0,.6), 0 0 0 1px var(--border-h);
      border-color: rgba(255,200,64,.3);
    }

    /* staggered card entrance */
    .game-card:nth-child(1) { animation-delay: .05s; }
    .game-card:nth-child(2) { animation-delay: .12s; }
    .game-card:nth-child(3) { animation-delay: .19s; }
    .game-card:nth-child(4) { animation-delay: .26s; }
    .game-card:nth-child(5) { animation-delay: .33s; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── media block ── */
    .media-block {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #08090e;
    }

    .poster-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity .4s var(--ease), transform .5s var(--ease);
    }
    .game-card:hover .poster-img {
      opacity: 0;
      transform: scale(1.06);
    }

    .trailer-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .4s var(--ease);
      pointer-events: none;
    }
    .game-card:hover .trailer-video {
      opacity: 1;
    }

    /* genre badge */
    .genre-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(7,8,13,.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.1);
      padding: 4px 10px;
      border-radius: 30px;
      font-size: .65rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: opacity .2s;
    }
    .game-card:hover .genre-badge { opacity: 0; }

    /* status badge */
    .status-pill {
      position: absolute;
      top: 12px; right: 12px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: opacity .2s;
    }
    .status-pill.out    { background: rgba(50,200,120,.2); color: #4ade80; border: 1px solid rgba(74,222,128,.2); }
    .status-pill.soon   { background: rgba(255,180,40,.12); color: var(--accent); border: 1px solid rgba(255,200,64,.2); }
    .status-pill.ea     { background: rgba(80,120,255,.15); color: #818cf8; border: 1px solid rgba(129,140,248,.2); }
    .game-card:hover .status-pill { opacity: 0; }

    /* play icon on hover */
    .play-hint {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      opacity: 0;
      transition: opacity .3s var(--ease);
      pointer-events: none;
    }
    .play-hint i {
      font-size: 2.5rem;
      color: rgba(255,255,255,.85);
      filter: drop-shadow(0 2px 12px rgba(0,0,0,.8));
      transform: scale(.8);
      transition: transform .3s var(--ease);
    }
    .game-card:hover .play-hint { opacity: 1; }
    .game-card:hover .play-hint i { transform: scale(1); }
    .no-trailer .play-hint { display: none; }

    /* bottom gradient overlay */
    .media-gradient {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(0deg, rgba(17,20,32,.9) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ── card content ── */
    .card-content { padding: 18px 18px 20px; }

    .game-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -.01em;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .short-desc {
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 16px;
    }

    /* ── store buttons ── */
    .store-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 30px;
      font-size: .68rem;
      font-weight: 600;
      text-decoration: none;
      transition: all .18s var(--ease);
      border: 1px solid transparent;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .store-btn i { font-size: .65rem; }

    .store-btn.steam   { background: rgba(27,107,80,.4); color: #5cccab; border-color: rgba(92,204,171,.15); }
    .store-btn.steam:hover { background: rgba(27,107,80,.8); border-color: #5cccab; }

    .store-btn.torrent { background: rgba(255,170,51,.08); color: var(--accent); border-color: rgba(255,200,64,.2); }
    .store-btn.torrent:hover { background: var(--accent); color: #07080d; border-color: var(--accent); }

    .store-btn.vkplay  { background: rgba(0,119,255,.2); color: #60a5fa; border-color: rgba(96,165,250,.2); }
    .store-btn.vkplay:hover { background: rgba(0,119,255,.5); border-color: #60a5fa; }

    .store-btn.epic    { background: rgba(255,255,255,.05); color: #cbd5e1; border-color: rgba(255,255,255,.1); }
    .store-btn.epic:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.3); }

    /* details button */
    .desc-btn {
      width: 100%;
      justify-content: center;
      background: rgba(255,255,255,.04);
      color: var(--muted);
      border-color: var(--border);
      cursor: pointer;
      padding: 8px;
      margin-top: 4px;
      font-size: .78rem;
      letter-spacing: .02em;
    }
    .desc-btn:hover {
      background: rgba(255,200,64,.1);
      color: var(--accent);
      border-color: rgba(255,200,64,.3);
      transform: none;
    }

    /* ── modal ── */
    .modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(4,5,10,.88);
      backdrop-filter: blur(16px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal.active { display: flex; animation: modalIn .25s var(--ease); }
    @keyframes modalIn {
      from { opacity:0; }
      to   { opacity:1; }
    }

    .modal-content {
      background: var(--surface);
      border-radius: 28px;
      max-width: 860px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: 0 40px 80px rgba(0,0,0,.7);
      position: relative;
      animation: modalUp .3s var(--ease);
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.1) transparent;
    }
    @keyframes modalUp {
      from { transform: translateY(20px) scale(.98); opacity:0; }
      to   { transform: translateY(0) scale(1);      opacity:1; }
    }

    .modal-close {
      position: absolute; top: 20px; right: 24px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      display: grid; place-items: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      transition: all .2s;
    }
    .modal-close:hover { background: rgba(255,200,64,.15); color: var(--accent); border-color: rgba(255,200,64,.3); }

    .modal-header { margin-bottom: 4px; padding-right: 48px; }
    .modal-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .modal-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .mbadge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .mbadge.genre { background: rgba(255,200,64,.12); color: var(--accent); border: 1px solid rgba(255,200,64,.2); }
    .mbadge.status-out  { background: rgba(74,222,128,.1); color: #4ade80; border: 1px solid rgba(74,222,128,.2); }
    .mbadge.status-soon { background: rgba(255,180,40,.1); color: var(--accent); border: 1px solid rgba(255,200,64,.2); }
    .mbadge.status-ea   { background: rgba(129,140,248,.1); color: #818cf8; border: 1px solid rgba(129,140,248,.2); }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: rgba(0,0,0,.25);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .spec-item { font-size: .8rem; }
    .spec-item .label { color: var(--muted); font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
    .spec-item .value { color: var(--text); font-weight: 500; }

    .modal-section-title {
      font-family: 'Syne', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .modal-section-title::after {
      content: ''; flex: 1;
      height: 1px;
      background: var(--border);
    }

    .modal p { color: #8a96ad; font-size: .9rem; line-height: 1.65; }

    .screenshots-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .screenshots-gallery img {
      width: 100%; border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .2s;
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    .screenshots-gallery img:hover {
      transform: scale(1.03);
      border-color: rgba(255,200,64,.4);
      box-shadow: 0 8px 20px rgba(0,0,0,.4);
    }
    .no-screens { color: var(--muted); font-size: .8rem; font-style: italic; }

    .modal-actions { margin-top: 28px; display: flex; gap: 10px; flex-wrap: wrap; }
    .modal-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: .85rem;
      font-weight: 600;
      text-decoration: none;
      transition: all .2s;
      font-family: 'DM Sans', sans-serif;
    }
    .modal-btn.primary {
      background: var(--accent);
      color: #07080d;
    }
    .modal-btn.primary:hover {
      background: #ffd166;
      box-shadow: 0 4px 20px rgba(255,200,64,.4);
      transform: translateY(-1px);
    }

    /* ── footer ── */
    .footer {
      text-align: center;
      padding: 48px 0 24px;
      margin-top: 48px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: .75rem;
    }
    .footer a { color: var(--muted); text-decoration: none; transition: color .2s; }
    .footer a:hover { color: var(--accent); }
    .footer .dot { margin: 0 8px; opacity: .4; }

    /* ── responsive ── */
    @media (max-width: 1200px) {
      .games-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 860px) {
      .games-grid { grid-template-columns: repeat(2, 1fr); }
      .wrap { padding: 16px 18px 40px; }
      .specs-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 580px) {
      .games-grid { grid-template-columns: 1fr; }
      .site-header { flex-direction: column; align-items: stretch; }
      .top-nav { justify-content: center; }
      .screenshots-gallery { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="ambient">
  <span></span><span></span><span></span>
</div>

<div class="wrap">
  <header class="site-header">
    <div class="brand">
      <div class="brand-icon">🎮</div>
      <div class="brand-text">
        <h1>LostGames</h1>
        <p>Каталог инди-игр, которые стоит найти</p>
      </div>
    </div>
    <nav class="top-nav">
      <a class="nav-pill" href="#"><i class="fas fa-fire"></i> Новинки</a>
      <a class="nav-pill" href="#"><i class="fas fa-star"></i> Избранное</a>
      <a class="nav-pill" href="#"><i class="fas fa-search"></i> Поиск</a>
    </nav>
  </header>

  <div class="section-head">
    <h2>Каталог</h2>
    <div class="line"></div>
    <div class="count" id="gameCount">0 игр</div>
  </div>

  <div class="games-grid" id="gamesGrid"></div>

  <footer class="footer">
    <p>LostGames — некоммерческий каталог. Все ссылки ведут на официальные страницы.</p>
    <p style="margin-top:8px;">
      <a href="#">GitHub</a>
      <span class="dot">·</span>
      <a href="#">Telegram</a>
      <span class="dot">·</span>
      <span>© 2026</span>
    </p>
  </footer>
</div>

<!-- modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
    <div id="modalBody"></div>
  </div>
</div>

  // ─── DATA ───────────────────────────────────────────────────────────────────
  const games = [
    {
