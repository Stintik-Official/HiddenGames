<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indie Haven — Лучшие инди-игры</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* ===== Стили (оставляем те же, проверенные) ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #eef2ff;
      line-height: 1.5;
    }

    /* Шапка */
    .site-header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .site-header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #ffb347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    .site-header p {
      color: #9aa4b2;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    /* Сетка карточек */
    .games-grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
    }

    /* Карточка */
    .game-card {
      background: #13171d;
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: 1px solid #222a34;
    }
    .game-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 32px -12px rgba(0,0,0,0.5);
      border-color: #ffb347;
    }

    /* Медиа-блок */
    .media-block {
      position: relative;
      background: #000;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }
    .media-block img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.25s ease;
    }
    .media-block iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .game-card:hover .media-block img {
      opacity: 0;
    }
    .game-card:hover .media-block iframe {
      opacity: 1;
      pointer-events: auto;
    }

    /* Контент */
    .card-content {
      padding: 20px;
    }
    .game-title {
      font-size: 1.35rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }
    .game-title span {
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(255,179,71,0.15);
      padding: 4px 12px;
      border-radius: 40px;
      color: #ffb347;
    }
    .short-desc {
      color: #acb6c8;
      font-size: 0.85rem;
      margin: 12px 0 18px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-buttons {
      display: flex;
      gap: 12px;
    }
    .btn {
      background: #2a313c;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-steam {
      background: #1b6b50;
    }
    .btn-steam:hover {
      background: #1f8a68;
    }
    .btn-desc {
      background: #2a313c;
      border: 1px solid #3a4452;
    }
    .btn-desc:hover {
      background: #3a4452;
      border-color: #ffb347;
    }

    /* Модалка */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .modal-content {
      background: #13171d;
      border: 1px solid #2a313c;
      border-radius: 28px;
      max-width: 900px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
    }
    .modal-close:hover {
      color: #ffb347;
    }
    .modal h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .modal-subhead {
      color: #ffb347;
      border-left: 3px solid #ffb347;
      padding-left: 12px;
      margin: 20px 0 16px;
      font-weight: 600;
    }
    .screenshots-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .screenshots-gallery img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #2a313c;
      cursor: pointer;
    }
    .specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: #0f1218;
      padding: 16px;
      border-radius: 20px;
      margin: 16px 0;
    }
    .specs p {
      font-size: 0.85rem;
      color: #cbd5e6;
    }
    .specs strong {
      color: #ffb347;
    }
    .footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid #22282f;
      font-size: 0.75rem;
      color: #5f6c82;
    }
    @media (max-width: 860px) {
      .games-grid {
        gap: 20px;
        padding: 24px 16px;
      }
      .modal-content {
        padding: 18px;
      }
      .specs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="site-header">
    <h1>🎮 Indie Haven</h1>
    <p>Коллекция лучших инди-игр. Наведи на карточку — запустится трейлер. Нажми «Описание» — увидишь подробности.</p>
  </div>
  <div class="games-grid" id="gamesGrid"></div>
  <footer class="footer">
    <p>🎮 Indie Haven — некоммерческий каталог. Все ссылки ведут в Steam.</p>
    <p><a href="#">GitHub</a> · <a href="#">Telegram</a></p>
  </footer>
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    // --------------------------------------------------------------

        fullDesc: "Спустя несколько лет после событий первой игры Нора пытается вернуться домой из параллельной вселенной. Апокалиптический пейзаж поглощён ИИ, враждебные машины, берлинское прошлое вступает в конфликт с настоящим, а прошлые ошибки аукаются ощущением безысходности. Иммерсивный игровой процесс, реалистичная физика, создание предметов и аутентичный инвентарь погрузят вас в мир Industria 2. Захватывающий шутер с глубоким сюжетом, модернизируемое оружие, механический боди-хоррор и полный дубляж.",
        poster: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2154070/capsule_616x353.jpg?t=1726109302",
        trailer: "https://www.youtube.com/embed/84MTyQ9L7R0?autoplay=1&mute=1&loop=1&playlist=84MTyQ9L7R0&controls=0&modestbranding=1&showinfo=0&rel=0",
        screenshots: [
          "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2154070/ss_dbbabda87d6822d839f49c45d801d17a2ea67368.600x338.jpg",
          "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2154070/ss_517f59c27b12b5d253d6a2246fc2d9ec9e5e33f5.600x338.jpg",
          "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2154070/ss_24e59656c2c286219de2e69a8904c5b15b8a5ac3.600x338.jpg"
        ],
        specs: {
          release: "2026",
          developer: "Bleakmill",
          publisher: "Headup",
          engine: "Unreal Engine 5",
          platform: "PC (Steam)"
        },
        steamLink: "https://store.steampowered.com/app/2154070/INDUSTRIA_2/"
      },
      {
        id: "roadtovostok",
        title: "Road to Vostok",
        genre: "Hardcore Survival",
        shortDesc: "Хардкорный одиночный симулятор выживания в постапокалиптической приграничной зоне. Реализм, перманентная смерть, глубокий лутинг.",
        fullDesc: "Игрок - одинокий выживале, пробивающийся через границу между Финляндией и Россией. Вам предстоит собирать луты и планировать экипировку, передвигаясь от убежища к убежищу, выполняя задания и обменивая вещи у торговцев. Главная цель — попасть в зону с перманентной смертью, которая называется \"Восток\". В игре реализованы смена дня и ночи, погоды, сезонов, а также система торговли.",

        trailer: "https://www.youtube.com/embed/OTFgTRsz43Q?autoplay=1&mute=1&loop=1&playlist=OTFgTRsz43Q&controls=0&modestbranding=1&showinfo=0&rel=0",
        screenshots: [
          "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1963610/ss_2c0c16afac6e3e3b5a4d8d8e3f1f6b7f1c5b5d8d.600x338.jpg",
          "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1963610/ss_a84c464ffd8d7bc78beeffad0ba0e47839fadcaa.600x338.jpg",
          "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1963610/capsule_616x353.jpg?t=1728471350"
        ],
        specs: {
          release: "2026 (Early Access)",
          developer: "Antti",

        },

      },
      {
        id: "nolaw",
        title: "NO LAW",
        genre: "Cyberpunk FPS",
        shortDesc: "Исследуйте портовый город будущего, погрязший в беззаконии. Верните то, что у вас отняли.",
        fullDesc: "Порт Дизайр — город, где закон никому не писан. Вам предстоит взять на себя роль Грея Харкера, бывшего военного, который пытается начать мирную жизнь. Исследуйте мир, вершите правосудие, заводите друзей и врагов. NO LAW — это игра от первого лица в стиле кибернуар с захватывающим сюжетом. Выбирайте свой стиль игры: скрытность или грубая сила, сражение или переговоры. Исследуйте мрачный индустриальный город, где каждый ваш поступок будет иметь последствия.",
        poster: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2674320/ss_bf9d94547250192073e65e42914b9ef41b06771a.600x338.jpg",
        trailer: "https://www.youtube.com/embed/Gt9J9JfO3kU?autoplay=1&mute=1&loop=1&playlist=Gt9J9JfO3kU&controls=0&modestbranding=1&showinfo=0&rel=0",
        screenshots: [
          "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2674320/ss_95f2ee2e0f99ef80dee2e7f12282c27a202a5995.600x338.jpg",
          "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2674320/ss_bd1b3e3f0f9f5ce548d7e1c5f7b9e5b1e5b1e5b1.600x338.jpg",
          "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2674320/ss_d2afac02126243439037d1ed088a83e6a39b4e8e.600x338.jpg"
        ],
        specs: {
          release: "TBA",
          developer: "Neon Giant",
          publisher: "KRAFTON, Inc.",
          engine: "Unreal Engine 4",
          platform: "PC, PS5, Xbox X|S"
        },
        steamLink: "https://store.steampowered.com/app/2674320/NO_LAW/"
      }
    ];

    // Генерация карточек на старте
    const grid = document.getElementById('gamesGrid');
    function renderCards() {
      grid.innerHTML = '';
      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <div class="media-block">
            <img src="${game.poster}" alt="${game.title}" loading="lazy">
            <iframe src="${game.trailer}" loading="lazy" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          </div>
          <div class="card-content">
            <div class="game-title">${game.title} <span>${game.genre}</span></div>
            <div class="short-desc">${game.shortDesc}</div>
            <div class="card-buttons">
              <a href="${game.steamLink}" target="_blank" class="btn btn-steam">В Steam →</a>
              <button class="btn btn-desc" data-id="${game.id}">📖 Описание</button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Модальное окно с данными
    const modal = document.getElementById('modal');
    const modalBody = document.getElementById('modalBody');
    function openModal(game) {
      const screensHtml = game.screenshots.map(url => `<img src="${url}" alt="screenshot" onclick="window.open('${url}','_blank')">`).join('');
      modalBody.innerHTML = `
        <h2>${game.title}</h2>
        <div class="modal-subhead">⚙️ Детали</div>
        <div class="specs">
          <p><strong>Релиз:</strong> ${game.specs.release}</p>
          <p><strong>Разработчик:</strong> ${game.specs.developer}</p>
          <p><strong>Издатель:</strong> ${game.specs.publisher}</p>
          <p><strong>Движок:</strong> ${game.specs.engine}</p>
          <p><strong>Платформа:</strong> ${game.specs.platform}</p>
          <p><strong>Жанр:</strong> ${game.genre}</p>
        </div>
        <div class="modal-subhead">📖 Сюжет и особенности</div>
        <p style="margin-bottom: 20px;">${game.fullDesc}</p>
        <div class="modal-subhead">📸 Скриншоты</div>
        <div class="screenshots-gallery">${screensHtml}</div>
        <div class="card-buttons" style="margin-top: 20px;">
          <a href="${game.steamLink}" target="_blank" class="btn btn-steam">Перейти в Steam →</a>
        </div>
      `;
      modal.style.display = 'block';
    }

    // Закрытие модального окна
    function closeModal() {
      modal.style.display = 'none';
    }

    // События
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('btn-desc')) {
        const id = e.target.getAttribute('data-id');
        const game = games.find(g => g.id === id);
        if (game) openModal(game);
      }
      if (e.target.classList.contains('modal') || e.target.classList.contains('modal-close')) closeModal();
    });

    renderCards();
  </script>
</body>
</html>
