<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LostGames — каталог инди-игр</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root{
      --bg:#080b10;
      --card:#121824;
      --card2:#161d2a;
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(255,179,71,.35);
      --text:#eef2ff;
      --muted:#97a3b7;
      --accent:#ffb347;
      --purple:#7c5cff;
    }
    html { scroll-behavior:smooth; }
    body{
      min-height:100vh;
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top,#17202d 0,#0b0f16 34%,#07090d 100%);
      line-height:1.45;
      overflow-x:hidden;
    }
    body::before{
      content:'';
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
      background-size:34px 34px;
      opacity:.28;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.6),transparent 92%);
    }
    .wrap{
      width:min(1360px,calc(100% - 32px));
      margin:0 auto;
      padding:22px 0 36px;
      position:relative;
      z-index:1;
    }
    .site-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      padding:16px 18px;
      border:1px solid var(--line);
      border-radius:22px;
      background:rgba(13,17,24,.72);
      backdrop-filter:blur(16px);
      box-shadow:0 18px 44px rgba(0,0,0,.28);
    }
    .brand h1{
      font-size:clamp(1.8rem,4vw,3rem);
      font-weight:800;
      letter-spacing:-.04em;
      line-height:1;
      background:linear-gradient(135deg,#fff 0,#ffd48f 48%,#ffb347 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .brand p{
      margin-top:8px;
      color:var(--muted);
      font-size:.92rem;
      max-width:60ch;
    }
    .top-nav{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:10px;
    }
    .nav-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:#d9deea;
      text-decoration:none;
      font-size:.84rem;
      font-weight:600;
      transition:.2s ease;
      white-space:nowrap;
    }
    .nav-pill:hover{
      transform:translateY(-2px);
      border-color:var(--line-strong);
      background:rgba(255,179,71,.08);
      color:#fff;
    }
    .games-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
      gap:22px;
      padding:20px 0 8px;
    }
    .game-card{
      overflow:hidden;
      border-radius:24px;
      border:1px solid var(--line);
      background:linear-gradient(180deg,var(--card),var(--card2));
      box-shadow:0 12px 28px rgba(0,0,0,.22);
      transition:transform .24s ease,box-shadow .24s ease,border-color .24s ease;
    }
    .game-card:hover{
      transform:translateY(-6px);
      border-color:var(--line-strong);
      box-shadow:0 24px 50px rgba(0,0,0,.38);
    }
    .media-block{
      position:relative;
      aspect-ratio:16/9;
      background:#000;
      overflow:hidden;
    }
    .poster-img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:opacity .25s ease,transform .35s ease;
    }
    .game-card:hover .poster-img{
      opacity:.16;
      transform:scale(1.04);
    }
    .poster-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:flex-end;
      padding:16px;
      background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.78));
    }
    .poster-meta{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .tag{
      align-self:flex-start;
      display:inline-flex;
      align-items:center;
      padding:5px 10px;
      border-radius:999px;
      font-size:.7rem;
      font-weight:700;
      color:#ffd28a;
      background:rgba(255,179,71,.13);
      border:1px solid rgba(255,179,71,.16);
    }
    .mini{
      font-size:.96rem;
      font-weight:700;
      color:#fff;
      text-shadow:0 2px 16px rgba(0,0,0,.55);
    }
    .trailer-iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease;
    }
    .game-card:hover .trailer-iframe{
      opacity:1;
      pointer-events:auto;
    }
    .card-content{padding:18px}
    .game-title{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }
    .game-title h3{
      font-size:1.14rem;
      line-height:1.15;
      font-weight:800;
      letter-spacing:-.03em;
    }
    .game-title span{
      flex-shrink:0;
      padding:5px 10px;
      border-radius:999px;
      font-size:.68rem;
      font-weight:700;
      color:#cbbfff;
      border:1px solid rgba(124,92,255,.18);
      background:rgba(124,92,255,.14);
      white-space:nowrap;
    }
    .short-desc{
      margin:10px 0 16px;
      color:#b6bfd0;
      font-size:.88rem;
      line-height:1.55;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .store-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:14px 0 10px;
    }
    .store-btn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      text-decoration:none;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid transparent;
      background:#2a2f39;
      color:#fff;
      font-size:.72rem;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
      font-family:inherit;
    }
    .store-btn:hover{transform:translateY(-2px)}
    .store-btn.steam{background:#1b2838}
    .store-btn.steam:hover{background:#2a475e}
    .store-btn.torrent{background:#1e6f5c}
    .store-btn.torrent:hover{background:#2a8b73}
    .store-btn.vkplay{background:#0077ff}
    .store-btn.vkplay:hover{background:#0066cc}
    .store-btn.epic{background:#202020;border-color:rgba(255,255,255,.65)}
    .store-btn.epic:hover{background:#fff;color:#000}
    .desc-btn{
      width:100%;
      justify-content:center;
      margin-top:8px;
      padding:11px;
      font-size:.82rem;
      background:linear-gradient(135deg,#2a2f39,#202632);
      border:1px solid #364150;
    }
    .desc-btn:hover{
      border-color:var(--line-strong);
      background:linear-gradient(135deg,#384150,#2a3340);
    }
    .modal{
      display:none;
      position:fixed;
      inset:0;
      z-index:1000;
      padding:22px;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,.82);
      backdrop-filter:blur(10px);
    }
    .modal-content{
      position:relative;
      width:100%;
      max-width:1020px;
      max-height:86vh;
      overflow-y:auto;
      padding:28px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,#151b25,#10151d);
      box-shadow:0 30px 80px rgba(0,0,0,.5);
      animation:modalFadeIn .2s ease;
    }
    @keyframes modalFadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
    .modal-close{
      position:absolute;
      top:14px;
      right:18px;
      font-size:30px;
      color:#aab2c3;
      cursor:pointer;
      transition:.2s ease;
    }
    .modal-close:hover{color:#ffb347;transform:rotate(90deg)}
    .modal h2{
      font-size:1.9rem;
      letter-spacing:-.03em;
      margin-bottom:8px;
    }
    .status-badge{
      display:inline-block;
      margin:6px 0 14px;
      padding:5px 12px;
      border-radius:999px;
      font-size:.76rem;
      color:#ffd28a;
      background:rgba(255,179,71,.16);
      border:1px solid rgba(255,179,71,.16);
    }
    .modal-subhead{
      margin:20px 0 14px;
      padding-left:12px;
      border-left:3px solid #ffb347;
      color:#ffd28a;
      font-weight:700;
    }
    .screenshots-gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:12px;
      margin:18px 0;
    }
    .screenshots-gallery img{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      transition:.2s ease;
    }
    .screenshots-gallery img:hover{
      transform:scale(1.02);
      border-color:#ffb347;
    }
    .specs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      padding:16px;
      margin:16px 0;
      border-radius:20px;
      background:#0b0f15;
      border:1px solid rgba(255,255,255,.06);
    }
    .specs p{color:#cbd5e6;font-size:.86rem}
    .specs strong{color:#ffcf7a}
    .footer{
      margin-top:10px;
      padding:30px 16px 8px;
      text-align:center;
      border-top:1px solid rgba(255,255,255,.08);
      color:#66738a;
      font-size:.78rem;
    }
    .footer a{color:#ffcf7a;text-decoration:none}
    @media (max-width:920px){
      .site-header{flex-direction:column;align-items:flex-start}
      .top-nav{justify-content:flex-start}
      .games-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
    }
    @media (max-width:680px){
      .wrap{width:min(100% - 24px,1360px);padding:16px 0 24px}
      .site-header,.modal-content{border-radius:20px;padding:16px}
      .games-grid{gap:16px;padding-top:16px}
      .specs{grid-template-columns:1fr}
      .store-buttons{gap:7px}
    }
  </style>
</head>
<body>
  <div class="wrap">

        <h1>LostGames</h1>

        <a class="nav-pill" href="#"><i class="fas fa-star"></i> Избранное</a>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <div id="modalBody"></div>

    const grid = document.getElementById('gamesGrid');

    function renderCards() {
      grid.innerHTML = '';
      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <div class="media-block">
            <img class="poster-img" src="${game.poster}" alt="${game.title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div style="display:none;align-items:center;justify-content:center;background:#1e293b;height:100%;color:#ffb347;font-size:2rem;">🎮 ${game.title}</div>
            <div class="poster-overlay">
              <div class="poster-meta">
                <div class="tag">${game.genre}</div>
                <div class="mini">Наведите, чтобы увидеть трейлер</div>
              </div>
            </div>
            <iframe class="trailer-iframe" src="${game.trailer}" loading="lazy" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          </div>
          <div class="card-content">
            <div class="game-title">
              <h3>${game.title}</h3>
              <span>${game.genre}</span>
            </div>
            <div class="short-desc">${game.shortDesc}</div>
            <div class="store-buttons">
              <a href="${game.links.steam}" target="_blank" class="store-btn steam"><i class="fab fa-steam"></i> Steam</a>
              <a href="${game.links.torrent}" target="_blank" class="store-btn torrent"><i class="fas fa-download"></i> Торрент</a>
              <a href="${game.links.vkplay}" target="_blank" class="store-btn vkplay"><i class="fab fa-vk"></i> VK Play</a>
              <a href="${game.links.epic}" target="_blank" class="store-btn epic"><i class="fab fa-epicgames"></i> Epic</a>
            </div>
            <button class="store-btn desc-btn" data-id="${game.id}"><i class="fas fa-info-circle"></i> Описание</button>
          </div>
        `;
        grid.appendChild(card);
      });

      document.querySelectorAll('.desc-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = btn.getAttribute('data-id');
          const game = games.find(g => g.id === id);
          if (game) openModal(game);
        });
      });
    }

    const modal = document.getElementById('modal');
    const modalBody = document.getElementById('modalBody');
    function openModal(game) {
      const screensHtml = game.screenshots.map(url => `<img src="${url}" alt="screenshot" onclick="window.open('${url}','_blank')" onerror="this.src='https://placehold.co/300x169/1e293b/ffb347?text=No+screenshot'">`).join('');
      modalBody.innerHTML = `
        <h2>${game.title}</h2>
        <div class="status-badge">${game.statusText}</div>
        <div class="specs">
          <p><strong>Релиз:</strong> ${game.specs.release}</p>
          <p><strong>Разработчик:</strong> ${game.specs.developer}</p>
          <p><strong>Издатель:</strong> ${game.specs.publisher}</p>
          <p><strong>Движок:</strong> ${game.specs.engine}</p>
          <p><strong>Платформа:</strong> ${game.specs.platform}</p>
        </div>
        <div class="modal-subhead">📖 Сюжет и особенности</div>
        <p style="margin-bottom: 20px;">${game.fullDesc}</p>
        <div class="modal-subhead">📸 Скриншоты</div>
        <div class="screenshots-gallery">${screensHtml}</div>
        <div style="margin-top: 20px;">
          <a href="${game.links.steam}" target="_blank" class="store-btn steam" style="display:inline-block;"><i class="fab fa-steam"></i> Перейти в Steam →</a>
        </div>
      `;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.style.display = 'none';
      document.body.style.overflow = '';
    }
    document.querySelector('.modal-close').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    renderCards();
  </script>
</body>
</html>
