<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LostGames — каталог инди-игр</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f11;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Inter', sans-serif;
      color: #e0e0e0;
      line-height: 1.5;
    }

    /* центральная узкая лента */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* шапка — лаконичная */
    .header {
      padding: 24px 0 16px;
      border-bottom: 1px solid #1e1e22;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
      text-decoration: none;
    }
    .logo span {
      color: #c026d3;
    }
    .search {
      flex: 1;
      max-width: 400px;
    }
    .search input {
      width: 100%;
      background: #1a1a22;
      border: 1px solid #2a2a32;
      border-radius: 8px;
      padding: 8px 14px;
      color: #e0e0e0;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    .search input:focus {
      outline: none;
      border-color: #c026d3;
    }
    .nav-links {
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    .nav-links a:hover {
      color: #c026d3;
    }

    /* карточка — широкая, вытянутая */
    .game-card {
      display: flex;
      gap: 20px;
      background: #131318;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      transition: all 0.2s ease;
      border: 1px solid #1f1f26;
    }
    .game-card:hover {
      transform: translateY(-2px);
      background: #18181f;
      border-color: #c026d3;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* обложка — фиксированная ширина */
    .card-poster {
      flex-shrink: 0;
      width: 120px;
      height: 160px;
      overflow: hidden;
      border-radius: 8px;
      background: #1a1a22;
    }
    .card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .no-poster {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a22;
      color: #777;
      font-size: 0.7rem;
      text-align: center;
    }

    /* контент карточки */
    .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.7rem;
      color: #aaa;
      margin-bottom: 10px;
      border-bottom: 1px dashed #222;
      padding-bottom: 6px;
    }
    .card-meta span {
      background: #1a1a22;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .card-description {
      font-size: 0.8rem;
      color: #bbb;
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-links a {
      background: #1f1f28;
      color: #ccc;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      text-decoration: none;
      transition: 0.2s;
    }
    .card-links a:hover {
      background: #c026d3;
      color: #fff;
    }

    /* статус-теги */
    .status-badge {
      display: inline-block;
      background: #c026d322;
      color: #c026d3;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      margin-left: 8px;
    }

    /* пагинация (простая, на потом) */
    .pagination {
      margin: 32px 0;
      text-align: center;
    }
    .pagination button {
      background: #1a1a22;
      border: 1px solid #2a2a32;
      color: #ccc;
      padding: 6px 14px;
      margin: 0 4px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }
    .pagination button:hover {
      background: #c026d3;
      border-color: #c026d3;
      color: #fff;
    }

    .footer {
      text-align: center;
      padding: 32px 0;
      border-top: 1px solid #1e1e22;
      margin-top: 32px;
      font-size: 0.7rem;
      color: #666;
    }

    @media (max-width: 700px) {
      .game-card {
        flex-direction: column;
      }
      .card-poster {
        width: 100%;
        height: auto;
        aspect-ratio: 16/9;
      }
      .header {
        flex-direction: column;
        align-items: stretch;
      }
      .search {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="#" class="logo">Lost<span>Games</span></a>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Поиск игр...">
    </div>
    <div class="nav-links">
      <a href="#">Новинки</a>
      <a href="#">Жанры</a>
      <a href="#">Обновления</a>
    </div>
  </div>

  <div id="gamesContainer"></div>

  <div class="footer">
    LostGames — некоммерческий каталог инди-игр. Все права принадлежат разработчикам.
  </div>
</div>

<script>
  // --------------------------------------------------------------
  //  ДАННЫЕ ИГР (постеры пока заглушки, ты заменишь позже)
  // --------------------------------------------------------------
  const gamesData = [
    {
      title: "Road to Vostok",
      genre: "Hardcore Survival",
      version: "Ранний доступ",
      status: "v0.8",
      year: "2026",
      description: "Хардкорный одиночный симулятор выживания в постапокалиптической приграничной зоне. Собирай ресурсы, улучшай экипировку и пытайся выжить.",
      poster: "https://placehold.co/120x160/1a1a22/c026d3?text=Road+to+Vostok",
      links: {
        steam: "https://store.steampowered.com/app/1963610/Road_to_Vostok/",
        torrent: "#"
      }
    },
    {
      title: "NO LAW",
      genre: "Cyberpunk FPS",
      version: "Скоро",
      status: "разработка",
      year: "2026",
      description: "Кибернуарный боевик от создателей The Ascent. Открытый город, выбор, последствия.",
      poster: "https://placehold.co/120x160/1a1a22/c026d3?text=NO+LAW",
      links: {
        steam: "https://store.steampowered.com/app/2674320/NO_LAW/",
        torrent: "#"
      }
    },
    {
      title: "INDUSTRIA 2",
      genre: "Narrative FPS",
      version: "Вышла",
      status: "1.0",
      year: "2026",
      description: "Сиквел инди-хита. Нора пытается вернуться домой из параллельного мира, поглощённого ИИ.",
      poster: "https://placehold.co/120x160/1a1a22/c026d3?text=INDUSTRIA+2",
      links: {
        steam: "https://store.steampowered.com/app/2154070/INDUSTRIA_2/",
        torrent: "#"
      }
    },
    {
      title: "Blight: Survival",
      genre: "Co-op Survival Horror",
      version: "Скоро",
      status: "демо",
      year: "2026",
      description: "Средневековый хоррор с кооперативом. Исследуйте проклятые земли, сражайтесь с монстрами.",
      poster: "https://placehold.co/120x160/1a1a22/c026d3?text=Blight+Survival",
      links: {
        steam: "https://store.steampowered.com/app/1963610/Blight_Survival/",
        torrent: "#"
      }
    },
    {
      title: "Styx: Blades of Greed",
      genre: "Stealth Action",
      version: "Вышла",
      status: "1.0",
      year: "2026",
      description: "Возвращение знаменитого гоблина-вора. Стелс, засады, планирование.",
      poster: "https://placehold.co/120x160/1a1a22/c026d3?text=Styx",
      links: {
        steam: "https://store.steampowered.com/app/3290690/Styx_Blades_of_Greed/",
        torrent: "#"
      }
    }
  ];

  function renderCards(games) {
    const container = document.getElementById('gamesContainer');
    if (!container) return;
    container.innerHTML = '';
    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      // статус-бейдж
      const statusBadge = game.status ? `<span class="status-badge">${game.status}</span>` : '';
      card.innerHTML = `
        <div class="card-poster">
          ${game.poster ? `<img src="${game.poster}" alt="${game.title}">` : `<div class="no-poster">no image</div>`}
        </div>
        <div class="card-content">
          <div class="card-title">
            ${game.title} ${statusBadge}
          </div>
          <div class="card-meta">
            <span>${game.genre}</span>
            <span>${game.version}</span>
            ${game.year ? `<span>${game.year}</span>` : ''}
          </div>
          <div class="card-description">${game.description}</div>
          <div class="card-links">
            ${game.links.steam ? `<a href="${game.links.steam}" target="_blank" rel="noopener">Steam</a>` : ''}
            ${game.links.torrent && game.links.torrent !== '#' ? `<a href="${game.links.torrent}" target="_blank" rel="noopener">Торрент</a>` : ''}
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  // поиск
  const searchInput = document.getElementById('searchInput');
  function filterGames() {
    const query = searchInput.value.toLowerCase();
    const filtered = gamesData.filter(game => game.title.toLowerCase().includes(query));
    renderCards(filtered);
  }
  searchInput.addEventListener('input', filterGames);

  // начальный рендер
  renderCards(gamesData);
</script>
</body>
</html>
