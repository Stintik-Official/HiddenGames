<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LostGames — каталог инди-игр</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0c10;
      font-family: 'Inter', sans-serif;
      color: #eef2ff;
      line-height: 1.45;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: 
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      z-index: -1;
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 32px 48px;
    }
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      margin-bottom: 48px;
      padding: 16px 24px;
      background: rgba(18, 22, 32, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 10px 25px -10px rgba(0,0,0,0.3);
    }
    .brand h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #ffb347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    .brand p {
      color: #8a9bb5;
      font-size: 0.8rem;
      margin-top: 4px;
    }
    .top-nav {
      display: flex;
      gap: 20px;
    }
    .nav-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 40px;
      background: rgba(255,255,255,.04);
      color: #ccc;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,.08);
    }
    .nav-pill:hover {
      background: rgba(255,179,71,.15);
      border-color: #ffb347;
      color: #fff;
      transform: translateY(-2px);
    }
    .games-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 28px;
      margin-top: 20px;
    }
    .game-card {
      background: #141a24;
      border-radius: 24px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #222a34;
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
    }
    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
      border-color: #ffb347;
    }
    .media-block {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }
    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.25s ease, transform 0.35s ease;
    }
    .game-card:hover .poster-img {
      opacity: 0;
      transform: scale(1.02);
    }
    .trailer-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .game-card:hover .trailer-video {
      opacity: 1;
      pointer-events: auto;
    }
    .poster-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(0deg, rgba(0,0,0,0.7), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .game-card:hover .poster-overlay {
      opacity: 1;
    }
    .tag {
      display: inline-block;
      background: rgba(255,179,71,0.2);
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #ffb347;
    }
    .card-content {
      padding: 18px;
    }
    .game-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }
    .game-title span {
      font-size: 0.7rem;
      background: #1f2a3a;
      padding: 2px 8px;
      border-radius: 20px;
      color: #ffb347;
    }
    .short-desc {
      color: #acb8cc;
      font-size: 0.85rem;
      margin: 10px 0 16px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .store-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1f2a36;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      transition: 0.2s;
    }
    .store-btn.steam { background: #1b6b50; }
    .store-btn.steam:hover { background: #1f8a68; }
    .store-btn.torrent { background: #2a2f39; border: 1px solid #ffaa33; color: #ffaa33; }
    .store-btn.torrent:hover { background: #ffaa33; color: #000; }
    .store-btn.vkplay { background: #0077ff; }
    .store-btn.vkplay:hover { background: #0066cc; }
    .store-btn.epic { background: #2a2a2a; border: 1px solid #fff; }
    .store-btn.epic:hover { background: #fff; color: #000; }
    .desc-btn {
      width: 100%;
      justify-content: center;
      margin-top: 16px;
      background: #2a3440;
      border: 1px solid #3a4452;
      padding: 8px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .desc-btn:hover {
      background: #3a4452;
      border-color: #ffb347;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: #141a24;
      border-radius: 28px;
      max-width: 900px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      border: 1px solid #2a3342;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
    }
    .modal-close:hover { color: #ffb347; }
    .modal h2 { font-size: 1.8rem; margin-bottom: 8px; }
    .status-badge {
      display: inline-block;
      background: rgba(255,179,71,0.2);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      color: #ffb347;
      margin-bottom: 16px;
    }
    .modal-subhead {
      font-weight: 700;
      color: #ffb347;
      border-left: 3px solid #ffb347;
      padding-left: 12px;
      margin: 20px 0 12px;
    }
    .screenshots-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .screenshots-gallery img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #2a3342;
      cursor: pointer;
      transition: 0.2s;
    }
    .screenshots-gallery img:hover {
      transform: scale(1.02);
      border-color: #ffb347;
    }
    .specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: #0f141c;
      padding: 16px;
      border-radius: 20px;
      margin: 16px 0;
    }
    .specs p { font-size: 0.85rem; color: #cbd5e6; }
    .specs strong { color: #ffb347; }
    .footer {
      text-align: center;
      padding: 40px 0 20px;
      margin-top: 40px;
      border-top: 1px solid rgba(255,255,255,.08);
      color: #5f6c82;
      font-size: 0.75rem;
    }
    @media (max-width: 1200px) {
      .games-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .games-grid { grid-template-columns: repeat(2, 1fr); }
      .wrap { padding: 16px; }
    }
    @media (max-width: 600px) {
      .games-grid { grid-template-columns: 1fr; }
      .site-header { flex-direction: column; align-items: stretch; text-align: center; }
      .top-nav { justify-content: center; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div class="brand">
      <h1>LostGames</h1>
      <p>Каталог инди-игр, которые стоит найти</p>
    </div>
    <nav class="top-nav">
      <a class="nav-pill" href="#"><i class="fas fa-fire"></i> Новинки</a>
      <a class="nav-pill" href="#"><i class="fas fa-star"></i> Избранное</a>
      <a class="nav-pill" href="#"><i class="fas fa-search"></i> Поиск</a>
    </nav>
  </header>

  <div class="games-grid" id="gamesGrid"></div>

  <footer class="footer">
    <p>LostGames — некоммерческий каталог. Все ссылки ведут на официальные страницы.</p>
    <p><a href="#">GitHub</a> · <a href="#">Telegram</a></p>
  </footer>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  const games = [
    {
      id: 'roadtovostok',
      title: 'Road to Vostok',
      genre: 'Hardcore Survival',
      statusText: '🚀 Ранний доступ',
      shortDesc: 'Хардкорный одиночный симулятор выживания в постапокалиптической приграничной зоне.',
      fullDesc: 'Road to Vostok — хардкорная survival игра. Действие в зоне отчуждения. Собирай ресурсы, улучшай экипировку.',
      poster: 'images/roadtonostok_poster.jpg',
      trailer: null,
      screenshots: ['images/roadtonostok_scr1.jpg', 'images/roadtonostok_scr2.jpg', 'images/roadtonostok_scr3.jpg'],
      specs: { release: '7 апреля 2026 (Ранний доступ)', developer: 'Antti', publisher: 'Road to Vostok Ltd', engine: 'Unity', platform: 'PC (Steam)' },
      links: { steam: 'https://store.steampowered.com/app/1963610/Road_to_Vostok/', torrent: '#', vkplay: '#', epic: '#' }
    },
    {
      id: 'nolaw',
      title: 'NO LAW',
      genre: 'Cyberpunk FPS',
      statusText: '🕒 Скоро',
      shortDesc: 'Кибернуарный боевик от создателей The Ascent. Город без правил.',
      fullDesc: 'NO LAW — кибернуарный экшен от первого лица. Действие в городе Порт Дезайр.',
      poster: 'images/nolaw_poster.jpg',
      trailer: 'videos/NoLaw_Trailer.mp4',
      screenshots: ['images/nolaw_scr1.jpg', 'images/nolaw_scr2.jpg', 'images/nolaw_scr3.jpg'],
      specs: { release: '2026', developer: 'Neon Giant', publisher: 'KRAFTON', engine: 'Unreal Engine 4', platform: 'PC, PS5, Xbox' },
      links: { steam: 'https://store.steampowered.com/app/2674320/NO_LAW/', torrent: '#', vkplay: '#', epic: '#' }
    },
    {
      id: 'industria2',
      title: 'INDUSTRIA 2',
      genre: 'Narrative FPS',
      statusText: '✅ Вышла',
      shortDesc: 'Нарративный шутер. Нора застряла в параллельном измерении.',
      fullDesc: 'INDUSTRIA 2 — сиквел инди-хита. Нора пытается вернуться домой.',
      poster: 'images/Industria2_poster.jpg',
      trailer: 'https://stintik-official.github.io/LostGames/videos/Industria2_trailer.mp4',
      screenshots: [],
      specs: { release: '30 апреля 2026', developer: 'Bleakmill', publisher: 'Headup', engine: 'Unreal Engine 5', platform: 'PC (Steam)' },
      links: { steam: 'https://store.steampowered.com/app/2154070/INDUSTRIA_2/', torrent: '#', vkplay: '#', epic: '#' }
    },
    {
      id: 'blight',
      title: 'Blight: Survival',
      genre: 'Co-op Survival Horror',
      statusText: '🕒 Скоро',
      shortDesc: 'Кооперативный экшен-хоррор в средневековом мире, охваченном чумой.',
      fullDesc: 'Blight: Survival — кооперативная игра на выживание.',
      poster: 'images/BlightSirvival_poster.jpg',
      trailer: null,
      screenshots: [],
      specs: { release: 'Ожидается', developer: 'Haenir Studio', publisher: 'Unknown', engine: 'Unreal Engine 4', platform: 'PC (Steam)' },
      links: { steam: 'https://store.steampowered.com/app/1963610/Blight_Survival/', torrent: '#', vkplay: '#', epic: '#' }
    },
    {
      id: 'styx',
      title: 'Styx: Blades of Greed',
      genre: 'Stealth Action',
      statusText: '✅ Вышла',
      shortDesc: 'Возвращение гоблина-вора. Стелс, засады, планирование.',
      fullDesc: 'Styx: Blades of Greed — новая глава в приключениях ловкого гоблина.',
      poster: 'images/StyxBlades_poster.jpg',
      trailer: 'https://stintik-official.github.io/LostGames/videos/StyxBlades_trailer.mp4',
      screenshots: [],
      specs: { release: '19 февраля 2026', developer: 'Cyanide Studio', publisher: 'Nacon', engine: 'Unreal Engine 4', platform: 'PC, PS5, Xbox' },
      links: { steam: 'https://store.steampowered.com/app/3290690/Styx_Blades_of_Greed/', torrent: '#', vkplay: '#', epic: '#' }
    }
  ];

  const grid = document.getElementById('gamesGrid');

  function renderCards() {
    grid.innerHTML = '';
    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      let videoHtml = '';
      if (game.trailer) {
        // Для абсолютных ссылок используем тег video с source и type
        videoHtml = `
          <video class="trailer-video" muted loop playsinline preload="metadata">
            <source src="${game.trailer}" type="video/mp4">
          </video>
        `;
      }
      card.innerHTML = `
        <div class="media-block">
          <img class="poster-img" src="${game.poster}" alt="${game.title}" loading="lazy" onerror="this.style.display='none'">
          ${videoHtml}
          <div class="poster-overlay">
            <div class="tag">${game.genre}</div>
          </div>
        </div>
        <div class="card-content">
          <div class="game-title">
            ${game.title}
            <span>${game.genre}</span>
          </div>
          <div class="short-desc">${game.shortDesc}</div>
          <div class="store-buttons">
            <a href="${game.links.steam}" target="_blank" class="store-btn steam"><i class="fab fa-steam"></i> Steam</a>
            <a href="${game.links.torrent}" target="_blank" class="store-btn torrent"><i class="fas fa-download"></i> Торрент</a>
            <a href="${game.links.vkplay}" target="_blank" class="store-btn vkplay"><i class="fab fa-vk"></i> VK Play</a>
            <a href="${game.links.epic}" target="_blank" class="store-btn epic"><i class="fab fa-epicgames"></i> Epic</a>
          </div>
          <button class="store-btn desc-btn" data-id="${game.id}"><i class="fas fa-info-circle"></i> Описание</button>
        </div>
      `;
      grid.appendChild(card);
    });
    document.querySelectorAll('.desc-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        const game = games.find(g => g.id === id);
        if (game) openModal(game);
      });
    });
  }

  const modal = document.getElementById('modal');
  const modalBody = document.getElementById('modalBody');
  function openModal(game) {
    const screensHtml = (game.screenshots && game.screenshots.length)
      ? `<div class="screenshots-gallery">${game.screenshots.map(url => `<img src="${url}" alt="скриншот" onclick="window.open('${url}','_blank')">`).join('')}</div>`
      : `<p style="color:#aaa;">Скриншоты появятся позже</p>`;
    modalBody.innerHTML = `
      <h2>${game.title}</h2>
      <div class="status-badge">${game.statusText}</div>
      <div class="specs">
        <p><strong>Релиз:</strong> ${game.specs.release}</p>
        <p><strong>Разработчик:</strong> ${game.specs.developer}</p>
        <p><strong>Издатель:</strong> ${game.specs.publisher}</p>
        <p><strong>Движок:</strong> ${game.specs.engine}</p>
        <p><strong>Платформа:</strong> ${game.specs.platform}</p>
      </div>
      <div class="modal-subhead">📖 Сюжет и особенности</div>
      <p>${game.fullDesc}</p>
      <div class="modal-subhead">📸 Скриншоты</div>
      ${screensHtml}
      <div style="margin-top: 20px;">
        <a href="${game.links.steam}" target="_blank" class="store-btn steam" style="display:inline-block;"><i class="fab fa-steam"></i> Перейти в Steam →</a>
      </div>
    `;
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }
  document.querySelector('.modal-close').addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

  renderCards();
</script>
</body>
</html>
