<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LostGames — каталог инди-игр</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0e12;
      font-family: 'Inter', sans-serif;
      color: #eef2ff;
      line-height: 1.4;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Шапка (как на giftovik – строго) */
    .site-header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .site-header h1 {
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #ffb347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    .site-header p {
      color: #9aa4b2;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    /* Сетка карточек (как на byrut – крупные, с отступами) */
    .games-grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 32px;
    }

    /* Карточка – тень, скругление, переход */
    .game-card {
      background: #14181f;
      border-radius: 24px;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s ease;
      border: 1px solid #222a34;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 36px -12px rgba(0,0,0,0.5);
      border-color: #ffb347;
    }

    /* Медиаблок + видео при наведении */
    .media-block {
      position: relative;
      background: #000;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }
    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
    }
    .trailer-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .game-card:hover .poster-img {
      opacity: 0;
    }
    .game-card:hover .trailer-iframe {
      opacity: 1;
      pointer-events: auto;
    }

    /* Контент карточки */
    .card-content {
      padding: 20px;
    }
    .game-title {
      font-size: 1.45rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .game-title span {
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(255,179,71,0.15);
      padding: 4px 12px;
      border-radius: 40px;
      color: #ffb347;
      border: 1px solid rgba(255,179,71,0.2);
    }
    .short-desc {
      color: #acb6c8;
      font-size: 0.85rem;
      margin: 10px 0 18px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Кнопки магазинов – цветные, с иконками */
    .store-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 12px;
    }
    .store-btn {
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      background: #2a2f39;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .store-btn i {
      font-size: 0.8rem;
    }
    .store-btn.steam { background: #1b6b50; }
    .store-btn.steam:hover { background: #1f8a68; transform: scale(1.02); }
    .store-btn.torrent { background: #2a2f39; border: 1px solid #ffaa33; color: #ffaa33; }
    .store-btn.torrent:hover { background: #ffaa33; color: #000; transform: scale(1.02); }
    .store-btn.vkplay { background: #0077ff; }
    .store-btn.vkplay:hover { background: #0066cc; transform: scale(1.02); }
    .store-btn.epic { background: #2a2f39; border: 1px solid #fff; }
    .store-btn.epic:hover { background: #fff; color: #000; transform: scale(1.02); }

    /* Кнопка описания – на всю ширину, заметная */
    .desc-btn {
      width: 100%;
      justify-content: center;
      background: #2a2f39;
      border: 1px solid #3a4452;
      margin-top: 8px;
      padding: 10px;
      font-size: 0.8rem;
    }
    .desc-btn:hover {
      background: #3a4452;
      border-color: #ffb347;
      transform: translateY(-2px);
    }

    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .modal-content {
      background: #14181f;
      border: 1px solid #2a313c;
      border-radius: 28px;
      max-width: 1000px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
      animation: modalFadeIn 0.2s ease;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
    }
    .modal-close:hover {
      color: #ffb347;
    }
    .modal h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .status-badge {
      display: inline-block;
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 0.75rem;
      background: rgba(255,179,71,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      color: #ffb347;
    }
    .modal-subhead {
      color: #ffb347;
      border-left: 3px solid #ffb347;
      padding-left: 12px;
      margin: 20px 0 16px;
      font-weight: 600;
    }
    .screenshots-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .screenshots-gallery img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #2a313c;
      cursor: pointer;
      transition: 0.2s;
    }
    .screenshots-gallery img:hover {
      transform: scale(1.02);
      border-color: #ffb347;
    }
    .specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: #0b0e12;
      padding: 16px;
      border-radius: 20px;
      margin: 16px 0;
    }
    .specs p {
      font-size: 0.85rem;
      color: #cbd5e6;
    }
    .specs strong {
      color: #ffb347;
    }
    .footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid #22282f;
      font-size: 0.75rem;
      color: #5f6c82;
    }
    .footer a {
      color: #ffb347;
      text-decoration: none;
    }

    @media (max-width: 860px) {
      .games-grid {
        gap: 20px;
        padding: 24px 16px;
      }
      .specs {
        grid-template-columns: 1fr;
      }
      .site-header {
        padding: 32px 16px 24px;
      }
    }
  </style>
</head>
<body>

<div id="modal" class="modal">

    <div id="modalBody"></div>

        vkplay: "#",
        epic: "#"
      }

  // Рендер сетки
  const grid = document.getElementById('gamesGrid');
  function renderCards() {
    grid.innerHTML = '';
    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      const storeBtns = `
        <div class="store-buttons">
          <a href="${game.links.steam}" target="_blank" class="store-btn steam"><i class="fab fa-steam"></i> Steam</a>
          <a href="${game.links.torrent}" target="_blank" class="store-btn torrent"><i class="fas fa-download"></i> Торрент</a>
          <a href="${game.links.vkplay}" target="_blank" class="store-btn vkplay"><i class="fab fa-vk"></i> VK Play</a>
          <a href="${game.links.epic}" target="_blank" class="store-btn epic"><i class="fab fa-epicgames"></i> Epic</a>
        </div>
      `;
      card.innerHTML = `
        <div class="media-block">
          <img class="poster-img" src="${game.poster}" alt="${game.title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div style="display: none; align-items: center; justify-content: center; background: #1e293b; height: 100%; color: #ffb347; font-size: 2rem;">🎮 ${game.title}</div>
          <iframe class="trailer-iframe" src="${game.trailer}" loading="lazy" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="card-content">
          <div class="game-title">${game.title} <span>${game.genre}</span></div>
          <div class="short-desc">${game.shortDesc}</div>
          ${storeBtns}
          <button class="store-btn desc-btn" data-id="${game.id}"><i class="fas fa-info-circle"></i> Описание</button>
        </div>
      `;
      grid.appendChild(card);
    });
    // обработчики описания
    document.querySelectorAll('.desc-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.getAttribute('data-id');
        const game = games.find(g => g.id === id);
        if (game) openModal(game);
      });
    });
  }

  // Модалка
  const modal = document.getElementById('modal');
  const modalBody = document.getElementById('modalBody');
  function openModal(game) {
    const screensHtml = game.screenshots.map(url => `<img src="${url}" alt="screenshot" onclick="window.open('${url}','_blank')" onerror="this.src='https://placehold.co/300x169/1e293b/ffb347?text=No+screenshot'">`).join('');
    modalBody.innerHTML = `
      <h2>${game.title}</h2>
      <div class="status-badge">${game.statusText}</div>
      <div class="specs">
        <p><strong>Релиз:</strong> ${game.specs.release}</p>
        <p><strong>Разработчик:</strong> ${game.specs.developer}</p>
        <p><strong>Издатель:</strong> ${game.specs.publisher}</p>
        <p><strong>Движок:</strong> ${game.specs.engine}</p>
        <p><strong>Платформа:</strong> ${game.specs.platform}</p>
      </div>
      <div class="modal-subhead">📖 Сюжет и особенности</div>
      <p style="margin-bottom: 20px;">${game.fullDesc}</p>
      <div class="modal-subhead">📸 Скриншоты</div>
      <div class="screenshots-gallery">${screensHtml}</div>
      <div style="margin-top: 20px;">
        <a href="${game.links.steam}" target="_blank" class="store-btn steam" style="display:inline-block;"><i class="fab fa-steam"></i> Перейти в Steam →</a>
      </div>
    `;
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }
  document.querySelector('.modal-close').addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

  renderCards();
</script>
</body>
</html>
