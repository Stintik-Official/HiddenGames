<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LostGames — портал инди-игр</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #121212;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #f0f0f0;
      line-height: 1.5;
    }

    /* фиксированная шапка */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0f0f0f;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      min-height: 70px;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff, #ff8c00);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .search-form {
      flex: 1;
      max-width: 400px;
    }

    .search-input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 40px;
      padding: 10px 18px;
      color: #fff;
      font-size: 0.9rem;
    }

    .nav-links {
      display: flex;
      gap: 24px;
    }
    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover {
      color: #ff8c00;
    }

    /* слайдер / hero (упрощённо) */
    .hero {
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      padding: 40px 24px;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }
    .hero h2 {
      font-size: 2rem;
      margin-bottom: 16px;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 16px;
    }
    .stat {
      background: #1e1e1e;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: bold;
    }

    /* сетка карточек */
    .games-grid {
      max-width: 1400px;
      margin: 48px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    .game-card {
      background: #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #2a2a2a;
    }
    .game-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
      border-color: #ff8c00;
    }
    .card-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #252525;
    }
    .card-content {
      padding: 16px;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .version {
      font-size: 0.7rem;
      background: #333;
      padding: 2px 8px;
      border-radius: 20px;
      color: #ff8c00;
    }
    .genre {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 6px;
    }
    .download-btn {
      margin-top: 14px;
      background: #ff8c00;
      border: none;
      color: #000;
      font-weight: bold;
      padding: 8px 0;
      width: 100%;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
    }
    .download-btn:hover {
      background: #ffaa33;
      transform: scale(1.02);
    }

    footer {
      text-align: center;
      padding: 32px;
      border-top: 1px solid #2a2a2a;
      color: #777;
      font-size: 0.75rem;
    }

    @media (max-width: 720px) {
      .site-header {
        flex-direction: column;
        padding: 12px;
      }
      .nav-links {
        gap: 16px;
      }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="logo">LostGames</div>
  <div class="search-form">
    <input type="text" class="search-input" placeholder="Поиск игр, жанров...">
  </div>
  <div class="nav-links">
    <a href="#">Новинки</a>
    <a href="#">Жанры</a>
    <a href="#">Форум</a>
  </div>
</header>

<div class="hero">
  <h2>Большой каталог инди-игр</h2>
  <div class="hero-stats">
    <div class="stat">🔥 42 игры</div>
    <div class="stat">👥 1.2k пользователей</div>
    <div class="stat">💬 340 комментариев</div>
  </div>
</div>

<div class="games-grid" id="gamesGrid">
  <!-- карточки будут динамически добавлены через JS, но для примера покажу одну -->
</div>

<footer>
  LostGames — некоммерческий каталог. Все права на игры принадлежат их разработчикам.
</footer>

<script>
  // пример данных (потом будут из БД или JSON)
  const gamesExample = [
    { title: "Road to Vostok", genre: "Hardcore Survival", version: "v0.8", poster: "https://placehold.co/400x225/2a2a2a/ff8c00?text=Road+to+Vostok" },
    { title: "NO LAW", genre: "Cyberpunk FPS", version: "предзаказ", poster: "https://placehold.co/400x225/2a2a2a/ff8c00?text=NO+LAW" },
    { title: "INDUSTRIA 2", genre: "Narrative FPS", version: "1.0", poster: "https://placehold.co/400x225/2a2a2a/ff8c00?text=INDUSTRIA+2" },
  ];

  const grid = document.getElementById('gamesGrid');
  function renderCards() {
    grid.innerHTML = '';
    gamesExample.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.innerHTML = `
        <img class="card-img" src="${game.poster}" alt="${game.title}">
        <div class="card-content">
          <div class="card-title">
            ${game.title}
            <span class="version">${game.version}</span>
          </div>
          <div class="genre">${game.genre}</div>
          <button class="download-btn">Скачать / Подробнее</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }
  renderCards();
</script>
</body>
</html>
